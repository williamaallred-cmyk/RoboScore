<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>RoboScore - Team Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const firebaseConfig = {
  apiKey: "AIzaSyDCHyAsSgut1ugpDyv0U4gslu1Z_5WOdDk",
  authDomain: "ms-robotics-reg-and-scoring.firebaseapp.com",
  databaseURL: "https://ms-robotics-reg-and-scoring-default-rtdb.firebaseio.com",
  projectId: "ms-robotics-reg-and-scoring",
  appId: "1:1095575706479:web:79266306ca32f4f9bf269a"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const toArr = snap => { const v=snap.val(); return v?Object.entries(v).map(([id,d])=>({id,...d})):[];};
const encodeEmail = email => email.toLowerCase().replace(/\./g,',').replace(/@/g,'-at-');
const schoolsRef  = did => db.ref(`districts/${did}/public/schools`);
const coachesRef  = did => db.ref(`districts/${did}/public/coaches`);
const regsRef     = did => db.ref(`districts/${did}/public/registrations`);
const userRolesRef = email => db.ref(`userRoles/${encodeEmail(email)}`);

const ICONS = {
  ClipboardList: '<rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>',
  CheckCircle: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>',
  ArrowLeft: '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
  Users: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
  Trash2: '<path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
  Plus: '<path d="M5 12h14"/><path d="M12 5v14"/>',
  LogOut: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
  School: '<path d="m4 6 8-4 8 4"/><path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/><path d="M14 22v-4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4"/><circle cx="12" cy="9" r="2"/>',
  Lock: '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  AlertCircle: '<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>',
  Pencil: '<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>',
};

function Icon({ name, size=18, className='' }) {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
      viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      className={className}
      dangerouslySetInnerHTML={{ __html: ICONS[name]||'' }} />
  );
}

function SchoolModal({ schools, onSelect, onClose }) {
  const [q,setQ]=useState('');
  const filt=schools.filter(s=>s.name.toLowerCase().includes(q.toLowerCase()));
  return(
    <div className="fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
        <div className="p-5 border-b border-slate-100">
          <h3 className="font-bold text-slate-900 text-lg">Select Your School</h3>
          <input autoFocus placeholder="Search schools..." className="w-full mt-3 p-2.5 border border-slate-200 rounded-lg text-sm focus:border-blue-400 outline-none" value={q} onChange={e=>setQ(e.target.value)}/>
        </div>
        <div className="overflow-y-auto max-h-72 p-3">
          {filt.length===0&&<p className="text-center text-slate-400 text-sm py-8">No schools found.</p>}
          {filt.map(s=>(
            <button key={s.id} onClick={()=>onSelect(s)} className="w-full text-left flex items-center gap-3 p-3 rounded-xl hover:bg-blue-50 transition-colors">
              <div className="bg-blue-100 text-blue-600 p-2 rounded-lg"><Icon name="School" size={16}/></div>
              <span className="font-medium text-slate-800 text-sm">{s.name}</span>
            </button>
          ))}
        </div>
        <div className="p-4 border-t border-slate-100"><button onClick={onClose} className="w-full py-2 text-slate-500 text-sm font-semibold hover:text-slate-700">Cancel</button></div>
      </div>
    </div>
  );
}

function App() {
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [roleInfo,setRoleInfo]=useState(null);
  const [resolving,setResolving]=useState(false);
  const [schools,setSchools]=useState([]);
  const [coaches,setCoaches]=useState([]);
  const [regs,setRegs]=useState([]);
  const [school,setSchool]=useState(null);
  const [showSchoolPicker,setShowSchoolPicker]=useState(false);
  const [teamName,setTeamName]=useState('');
  const [students,setStudents]=useState(['','','']);
  const [submitting,setSubmitting]=useState(false);
  const [done,setDone]=useState(false);
  const [error,setError]=useState('');
  const [editId,setEditId]=useState(null);
  const [editName,setEditName]=useState('');
  const [editStudents,setEditStudents]=useState(['','','']);
  const [editSaving,setEditSaving]=useState(false);
  const [adminCoachId,setAdminCoachId]=useState('');

  useEffect(()=>{const u=auth.onAuthStateChanged(u=>{setUser(u);setLoading(false);});return()=>u();},[]);

  useEffect(()=>{
    if(!user?.uid)return;
    setResolving(true);
    const email=user.email?.toLowerCase();
    db.ref('superAdmins').child(user.uid).once('value').then(snap=>{
      if(snap.val()===true){setRoleInfo({role:'superAdmin'});setResolving(false);return;}
      userRolesRef(user.email).once('value').then(rs=>{
        const r=rs.val();
        if(r?.districtId){
          db.ref(`userRoleUids/${user.uid}`).set({role:r.role||'coach',districtId:r.districtId}).catch(()=>{});
          setRoleInfo({role:r.role||'coach',districtId:r.districtId});
          setResolving(false);
        } else {
          setRoleInfo({role:'none'});
          setResolving(false);
        }
      });
    }).catch(()=>{setRoleInfo({role:'none'});setResolving(false);});
  },[user]);

  const districtId=roleInfo?.districtId;

  useEffect(()=>{
    if(!districtId)return;
    const sr=schoolsRef(districtId),cr=coachesRef(districtId),rr=regsRef(districtId);
    const sh=s=>setSchools(toArr(s)),ch=s=>setCoaches(toArr(s)),rh=s=>setRegs(toArr(s));
    sr.on('value',sh);cr.on('value',ch);rr.on('value',rh);
    return()=>{sr.off('value',sh);cr.off('value',ch);rr.off('value',rh);};
  },[districtId]);

  useEffect(()=>{
    if(!user||!coaches.length||school)return;
    const email=user.email?.toLowerCase();
    const mine=coaches.find(c=>c.email?.toLowerCase()===email);
    if(mine){
      const schId=mine.schoolIds?.[0];
      const s=schools.find(sc=>sc.id===schId);
      if(s)setSchool(s);
    }
  },[coaches,schools,user,school]);

  const signInGoogle=async()=>{try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}catch(e){console.error(e);}};
  const signInMicrosoft=async()=>{try{await auth.signInWithPopup(new firebase.auth.OAuthProvider('microsoft.com'));}catch(e){console.error(e);}};
  const signInEmail=async(em,pw)=>auth.signInWithEmailAndPassword(em,pw);
  const signOut=()=>auth.signOut();

  const isAdmin=roleInfo?.role==='districtAdmin'||roleInfo?.role==='superAdmin';

  const myRegs=isAdmin?regs:regs.filter(r=>{
    if(!user)return false;
    return r.coachEmail?.toLowerCase()===user.email?.toLowerCase();
  });

  const startEdit=r=>{setEditId(r.id);setEditName(r.teamName);setEditStudents((r.students||[]).length?[...r.students]:['','','']);};
  const cancelEdit=()=>{setEditId(null);setEditName('');setEditStudents(['','','']);};
  const saveEdit=async()=>{
    if(!editName.trim()||editSaving)return;
    setEditSaving(true);
    try{
      await regsRef(districtId).child(editId).update({teamName:editName.trim(),students:editStudents.map(s=>s.trim()).filter(Boolean)});
      cancelEdit();
    }catch(e){setError('Failed to save changes.');}
    setEditSaving(false);
  };
  const deleteReg=async r=>{
    if(!window.confirm(`Delete "${r.teamName}"? This cannot be undone.`))return;
    try{await regsRef(districtId).child(r.id).remove();}catch(e){setError('Failed to delete team.');}
  };

  const submit=async()=>{
    if(!teamName.trim()||!school||submitting)return;
    const stArr=students.map(s=>s.trim()).filter(Boolean);
    let coachEmail,coachName;
    if(isAdmin){
      const picked=coaches.find(c=>c.id===adminCoachId);
      coachEmail=picked?.email||user.email.toLowerCase();
      coachName=picked?.name||user.displayName||'';
    }else{
      const coach=coaches.find(c=>c.email?.toLowerCase()===user.email?.toLowerCase());
      coachEmail=user.email.toLowerCase();
      coachName=coach?.name||user.displayName||'';
    }
    setSubmitting(true);setError('');
    try{
      const numRef=db.ref(`districts/${districtId}/public/nextTeamNumber`);
      const txResult=await numRef.transaction(n=>(n||0)+1);
      const teamNumber=txResult.snapshot.val();
      await regsRef(districtId).push({teamNumber,teamName:teamName.trim(),schoolId:school.id,schoolName:school.name,students:stArr,coachEmail,coachName,registeredAt:new Date().toISOString()});
      setTeamName('');setStudents(['','','']);setDone(true);setTimeout(()=>setDone(false),4000);
    }catch(e){setError('Failed to register. Please try again.');}
    setSubmitting(false);
  };

  const isSignedIn=!!user&&!user.isAnonymous;

  if(loading||resolving)return<div className="min-h-screen flex items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div></div>;

  if(!isSignedIn){const [ep,setEp]=React.useState(false),[em,setEm]=React.useState(''),[ pw,setPw]=React.useState(''),[ err,setErr]=React.useState(''),[ busy,setBusy]=React.useState(false);
    const submit=async()=>{setBusy(true);setErr('');try{await signInEmail(em,pw);}catch(e){setErr(e.message||'Sign-in failed.');}setBusy(false);};
    return(
    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
      <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg"><Icon name="ClipboardList" size={32}/></div>
          <h2 className="text-2xl font-bold text-slate-900">Team Registration</h2>
          <p className="text-slate-500 text-sm mt-1">Coaches: sign in to register your teams.</p>
        </div>
        <div className="space-y-3">
          <button onClick={signInGoogle} className="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 py-3 rounded-xl font-semibold text-slate-700 hover:bg-slate-50 transition-all shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" alt="Google"/> Continue with Google
          </button>
          <button onClick={signInMicrosoft} className="w-full flex items-center justify-center gap-3 bg-[#2F2F2F] text-white py-3 rounded-xl font-semibold hover:bg-black transition-all shadow-sm">
            <svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
            Continue with Microsoft
          </button>
          <div className="relative flex items-center gap-3 py-1"><div className="flex-1 h-px bg-slate-200"/><span className="text-xs text-slate-400 font-semibold">OR</span><div className="flex-1 h-px bg-slate-200"/></div>
          {!ep?(
            <button onClick={()=>setEp(true)} className="w-full py-3 rounded-xl border border-slate-200 text-slate-600 font-semibold text-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-2"><Icon name="Mail" size={16}/> Sign in with Email & Password</button>
          ):(
            <div className="space-y-3">
              <input type="email" autoFocus placeholder="Email" className="w-full p-3 border border-slate-200 rounded-xl text-sm focus:border-blue-400 outline-none" value={em} onChange={e=>setEm(e.target.value)}/>
              <input type="password" placeholder="Password" className="w-full p-3 border border-slate-200 rounded-xl text-sm focus:border-blue-400 outline-none" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
              {err&&<p className="text-xs text-red-500">{err}</p>}
              <button onClick={submit} disabled={!em||!pw||busy} className="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 disabled:opacity-40 transition-all">{busy?'Signing in...':'Sign In'}</button>
              <button onClick={()=>{setEp(false);setErr('');}} className="w-full text-sm text-slate-400 hover:text-slate-600">Back</button>
            </div>
          )}
        </div>
        <a href="index.html" className="mt-6 flex justify-center items-center gap-1.5 text-sm text-slate-400 hover:text-slate-600"><Icon name="ArrowLeft" size={14}/> Back to Home</a>
      </div>
    </div>
  );}

  if(roleInfo?.role==='none')return(
    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl border border-slate-200 p-10 shadow-xl max-w-md text-center">
        <div className="w-14 h-14 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-5"><Icon name="Lock" size={28}/></div>
        <h2 className="text-xl font-bold text-slate-900 mb-2">Not a Registered Coach</h2>
        <p className="text-slate-500 text-sm mb-4"><strong>{user?.email}</strong> is not on the coach list. Contact your district admin.</p>
        <button onClick={signOut} className="text-sm text-slate-500 hover:text-red-600 flex items-center gap-1.5 mx-auto"><Icon name="LogOut" size={14}/> Sign out</button>
      </div>
    </div>
  );

  return(
    <div className="min-h-screen bg-slate-50 flex flex-col">
      {showSchoolPicker&&<SchoolModal schools={schools} onSelect={s=>{setSchool(s);setShowSchoolPicker(false);}} onClose={()=>setShowSchoolPicker(false)}/>}
      <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div className="flex items-center gap-4">
          <a href="index.html" className="flex items-center gap-1.5 text-slate-400 hover:text-slate-700 text-sm font-medium"><Icon name="ArrowLeft" size={16}/> Home</a>
          <div className="w-px h-5 bg-slate-200"/>
          <div className="flex items-center gap-2"><div className="bg-blue-600 p-1.5 rounded-lg text-white"><Icon name="ClipboardList" size={16}/></div><span className="font-bold text-slate-800">Team Registration</span></div>
        </div>
        <div className="flex items-center gap-3">
          {user.photoURL&&<img src={user.photoURL} className="w-8 h-8 rounded-full" alt={user.displayName}/>}
          <span className="text-sm text-slate-600 hidden sm:block">{user.displayName}</span>
          <button onClick={signOut} className="flex items-center gap-1.5 px-3 py-1.5 text-sm text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all"><Icon name="LogOut" size={14}/> Sign out</button>
        </div>
      </header>
      <main className="flex-1 p-6 md:p-10 max-w-2xl mx-auto w-full space-y-8">
        {done&&(<div className="bg-emerald-50 border border-emerald-200 rounded-xl px-5 py-4 flex items-center gap-3 shadow-sm">
          <Icon name="CheckCircle" size={20} className="text-emerald-600"/><span className="font-semibold text-emerald-800">Team registered successfully!</span>
        </div>)}
        {error&&(<div className="bg-red-50 border border-red-200 rounded-xl px-5 py-4 flex items-center gap-3">
          <Icon name="AlertCircle" size={20} className="text-red-600"/><span className="text-red-800 text-sm">{error}</span>
        </div>)}
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-6">
          <h2 className="text-lg font-bold text-slate-800">Register a New Team</h2>
          {isAdmin&&(
            <div>
              <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 tracking-wide">Coach (optional)</label>
              <select className="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-blue-400 outline-none text-sm text-slate-800" value={adminCoachId} onChange={e=>{
                setAdminCoachId(e.target.value);
                const c=coaches.find(co=>co.id===e.target.value);
                if(c?.schoolIds?.[0]){const s=schools.find(sc=>sc.id===c.schoolIds[0]);if(s)setSchool(s);}
              }}>
                <option value="">— select coach —</option>
                {coaches.map(c=><option key={c.id} value={c.id}>{c.name} ({c.email})</option>)}
              </select>
            </div>
          )}
          <div>
            <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 tracking-wide">School *</label>
            {isAdmin?(
              <button onClick={()=>setShowSchoolPicker(true)} className="w-full text-left p-3 border-2 border-slate-200 rounded-xl hover:border-blue-400 transition-colors flex items-center gap-3">
                {school?(<><div className="bg-blue-100 text-blue-600 p-1.5 rounded-lg"><Icon name="School" size={14}/></div><span className="font-semibold text-slate-900 text-sm">{school.name}</span><span className="text-xs text-blue-600 ml-auto font-semibold">Change </span></>):(<><div className="bg-slate-100 text-slate-400 p-1.5 rounded-lg"><Icon name="School" size={14}/></div><span className="text-slate-400 text-sm">Select school...</span></>)}
              </button>
            ):(
              <div className="w-full p-3 border-2 border-slate-100 rounded-xl bg-slate-50 flex items-center gap-3">
                <div className="bg-blue-100 text-blue-600 p-1.5 rounded-lg"><Icon name="School" size={14}/></div>
                <span className="font-semibold text-slate-900 text-sm">{school?.name||'—'}</span>
              </div>
            )}
          </div>
          <div>
            <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 tracking-wide">Team Name *</label>
            <input className="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-blue-400 outline-none text-slate-900 font-medium" placeholder="e.g. Robo Warriors" value={teamName} onChange={e=>setTeamName(e.target.value)}/>
          </div>
          <div>
            <div className="flex items-center justify-between mb-1.5">
              <label className="block text-xs font-bold text-slate-500 uppercase tracking-wide">Student Names</label>
              <button onClick={()=>setStudents([...students,''])} className="text-xs text-blue-600 font-bold flex items-center gap-1 hover:underline"><Icon name="Plus" size={12}/> Add</button>
            </div>
            <div className="space-y-2">
              {students.map((s,i)=>(
                <div key={i} className="flex items-center gap-2">
                  <input className="flex-1 p-2.5 border border-slate-200 rounded-lg focus:border-blue-400 outline-none text-sm" placeholder={`Student ${i+1}`} value={s} onChange={e=>{const n=[...students];n[i]=e.target.value;setStudents(n);}}/>
                  {students.length>2&&<button onClick={()=>setStudents(students.filter((_,j)=>j!==i))} className="p-1.5 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={14}/></button>}
                </div>
              ))}
            </div>
          </div>
          <button onClick={submit} disabled={!teamName.trim()||!school||submitting}
            className="w-full py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 disabled:opacity-40 transition-all shadow-sm">
            {submitting?'Registering...':'Register Team'}
          </button>
        </div>
        {myRegs.length>0&&(
          <div className="bg-white rounded-2xl border border-slate-200 shadow-sm p-6 space-y-4">
            <h3 className="text-base font-bold text-slate-800 flex items-center gap-2"><Icon name="Users" size={17} className="text-blue-500"/> {isAdmin?`All Teams (${myRegs.length})`:`My Teams (${myRegs.length})`}</h3>
            <div className="space-y-3">
              {myRegs.map(r=>(
                <div key={r.id} className="border border-slate-200 rounded-xl overflow-hidden">
                  {editId===r.id?(
                    <div className="p-4 space-y-3 bg-blue-50">
                      <div>
                        <label className="text-xs font-bold text-slate-500 uppercase block mb-1">Team Name</label>
                        <input autoFocus className="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:border-blue-400 outline-none" value={editName} onChange={e=>setEditName(e.target.value)}/>
                      </div>
                      <div>
                        <div className="flex items-center justify-between mb-1">
                          <label className="text-xs font-bold text-slate-500 uppercase">Students</label>
                          <button onClick={()=>setEditStudents([...editStudents,''])} className="text-xs text-blue-600 font-bold hover:underline">+ Add</button>
                        </div>
                        <div className="space-y-1.5">
                          {editStudents.map((s,i)=>(
                            <div key={i} className="flex gap-2">
                              <input className="flex-1 p-2 border border-slate-200 rounded-lg text-sm focus:border-blue-400 outline-none" placeholder={`Student ${i+1}`} value={s} onChange={e=>{const n=[...editStudents];n[i]=e.target.value;setEditStudents(n);}}/>
                              {editStudents.length>1&&<button onClick={()=>setEditStudents(editStudents.filter((_,j)=>j!==i))} className="p-1.5 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={13}/></button>}
                            </div>
                          ))}
                        </div>
                      </div>
                      <div className="flex gap-2 pt-1">
                        <button onClick={saveEdit} disabled={!editName.trim()||editSaving} className="px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700 disabled:opacity-40">{editSaving?'Saving...':'Save'}</button>
                        <button onClick={cancelEdit} className="px-4 py-2 text-sm text-slate-500 hover:text-slate-800 font-semibold">Cancel</button>
                      </div>
                    </div>
                  ):(
                    <div className="flex items-center justify-between p-4 bg-slate-50">
                      <div>
                    <div className="flex items-center gap-2 mb-0.5">
                        {r.teamNumber&&<span className="text-xs font-black bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full border border-amber-200">#{r.teamNumber}</span>}
                        <div className="font-semibold text-slate-900 text-sm">{r.teamName}</div>
                      </div>
                        <div className="text-xs text-slate-500 mt-0.5">{r.schoolName}{isAdmin&&r.coachName&&<span className="ml-2 text-slate-400">· {r.coachName}</span>}</div>
                        <div className="flex flex-wrap gap-1 mt-1.5">{(r.students||[]).filter(Boolean).map((s,i)=><span key={i} className="text-xs bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full">{s}</span>)}</div>
                      </div>
                      <div className="flex items-center gap-1 ml-3 shrink-0">
                        <button onClick={()=>startEdit(r)} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Edit"><Icon name="Pencil" size={15}/></button>
                        <button onClick={()=>deleteReg(r)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="Delete"><Icon name="Trash2" size={15}/></button>
                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
