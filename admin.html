function Icon({ name, size=18, className='' }) {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
      viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      className={className}
      dangerouslySetInnerHTML={{ __html: ICONS[name]||'' }} />
  );
}

function LoginView({ onGoogleSignIn, onMicrosoftSignIn, onEmailSignIn }) {
  const [ep,setEp]=useState(false);
  const [em,setEm]=useState(''),[pw,setPw]=useState(''),[err,setErr]=useState(''),[busy,setBusy]=useState(false);
  const submit=async()=>{
    setBusy(true);setErr('');
    try{await onEmailSignIn(em,pw);}catch(e){setErr(e.message||'Sign-in failed.');}
    setBusy(false);
  };
  return (
    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
      <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div className="text-center mb-8">
          <div className="w-16 h-16 bg-amber-500 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-amber-200"><Icon name="Shield" size={32}/></div>
          <h2 className="text-2xl font-bold text-slate-900">Admin Panel</h2>
          <p className="text-slate-500 text-sm mt-1">Sign in to manage your district.</p>
        </div>
        <div className="space-y-3">
          <button onClick={onGoogleSignIn} className="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 py-3 rounded-xl font-semibold text-slate-700 hover:bg-slate-50 transition-all shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" alt="Google"/> Continue with Google
          </button>
          <button onClick={onMicrosoftSignIn} className="w-full flex items-center justify-center gap-3 bg-[#2F2F2F] text-white py-3 rounded-xl font-semibold hover:bg-black transition-all shadow-sm">
            <svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
            Continue with Microsoft
          </button>
          <div className="relative flex items-center gap-3 py-1"><div className="flex-1 h-px bg-slate-200"/><span className="text-xs text-slate-400 font-semibold">OR</span><div className="flex-1 h-px bg-slate-200"/></div>
          {!ep?(
            <button onClick={()=>setEp(true)} className="w-full py-3 rounded-xl border border-slate-200 text-slate-600 font-semibold text-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
              <Icon name="Mail" size={16}/> Sign in with Email & Password
            </button>
          ):(
            <div className="space-y-3">
              <input type="email" autoFocus placeholder="Email" className="w-full p-3 border border-slate-200 rounded-xl text-sm focus:border-amber-400 outline-none" value={em} onChange={e=>setEm(e.target.value)}/>
              <input type="password" placeholder="Password" className="w-full p-3 border border-slate-200 rounded-xl text-sm focus:border-amber-400 outline-none" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
              {err&&<p className="text-xs text-red-500">{err}</p>}
              <button onClick={submit} disabled={!em||!pw||busy} className="w-full py-3 bg-amber-500 text-white font-bold rounded-xl hover:bg-amber-600 disabled:opacity-40 transition-all">{busy?'Signing in...':'Sign In'}</button>
              <button onClick={()=>{setEp(false);setErr('');}} className="w-full text-sm text-slate-400 hover:text-slate-600">Back</button>
            </div>
          )}
        </div>
        <a href="index.html" className="mt-6 flex justify-center items-center gap-1.5 text-sm text-slate-400 hover:text-slate-600"><Icon name="ArrowLeft" size={14}/> Back to Home</a>
      </div>
    </div>
  );
}

const BLANK_CHALLENGE = {
  name:'', type:'score', method:'absolute', instructions:'', leaderBonus:10,
  tiers:[{threshold:5,points:95},{threshold:10,points:80}],
  absoluteType:'open', maxScore:100, fixedValues:[10,20,30],
  fracBrackets:[{label:'Top 1/3',points:100},{label:'Middle 1/3',points:70},{label:'Bottom 1/3',points:40}],
};

function ChallengeForm({ onSave, onCancel, initial }) {
  const [f,setF] = useState(initial?{...BLANK_CHALLENGE,...initial}:{...BLANK_CHALLENGE});
  const upd = p => setF(v=>({...v,...p}));
  const addTier=()=>upd({tiers:[...f.tiers,{threshold:0,points:0}]});
  const remTier=i=>upd({tiers:f.tiers.filter((_,j)=>j!==i)});
  const updTier=(i,k,v)=>{const t=[...f.tiers];t[i]={...t[i],[k]:parseFloat(v)||0};upd({tiers:t});};
  const addFrac=()=>upd({fracBrackets:[...f.fracBrackets,{label:'',points:0}]});
  const remFrac=i=>upd({fracBrackets:f.fracBrackets.filter((_,j)=>j!==i)});
  const updFrac=(i,k,v)=>{const fb=[...f.fracBrackets];fb[i]={...fb[i],[k]:k==='points'?(parseFloat(v)||0):v};upd({fracBrackets:fb});};
  const addFix=()=>upd({fixedValues:[...(f.fixedValues||[]),0]});
  const remFix=i=>upd({fixedValues:(f.fixedValues||[]).filter((_,j)=>j!==i)});
  const updFix=(i,v)=>{const vals=[...(f.fixedValues||[])];vals[i]=parseFloat(v)||0;upd({fixedValues:vals});};
  return (
    <div className="bg-white p-6 rounded-xl border-2 border-emerald-100 shadow-xl space-y-6">
      <h4 className="font-bold text-slate-800 text-lg">{initial?'Edit Challenge':'New Challenge'}</h4>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label className="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Challenge Name *</label>
          <input className="w-full p-2.5 border border-slate-200 rounded-lg focus:border-emerald-400 outline-none"
            placeholder="e.g. Autonomous Navigation" value={f.name} onChange={e=>upd({name:e.target.value})}/>
        </div>
        <div>
          <label className="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Entry Value Type</label>
          <select className="w-full p-2.5 border border-slate-200 rounded-lg focus:border-emerald-400 outline-none"
            value={f.type} onChange={e=>upd({type:e.target.value})}>
            <option value="score">Raw Score (High Wins)</option>
            <option value="time-fast">Time (Fastest Wins)</option>
            <option value="time-long">Time (Longest Wins)</option>
          </select>
        </div>
      </div>
      <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
        <h5 className="text-sm font-bold text-slate-700 mb-3">Scoring Method</h5>
        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
          {[{value:'absolute',title:'Absolute Scoring',desc:'Raw value used directly.'},{value:'relative',title:'Relative Proximity',desc:'Gap from leader picks tier.'},{value:'fractional',title:'Fractional Brackets',desc:'Equal groups earn set points.'}].map(opt=>(
            <button key={opt.value} onClick={()=>upd({method:opt.value})}
              className={`p-4 rounded-xl border-2 text-left transition-all ${f.method===opt.value?'border-emerald-500 bg-emerald-50':'bg-white border-slate-200 opacity-60 hover:opacity-80'}`}>
              <div className="font-bold text-slate-900 text-sm">{opt.title}</div>
              <div className="text-xs text-slate-500 mt-1">{opt.desc}</div>
            </button>
          ))}
        </div>
      </div>
      {f.method==='absolute'&&(
        <div className="bg-blue-50 p-5 rounded-xl border border-blue-100 space-y-4">
          <h5 className="text-sm font-bold text-blue-900 flex items-center gap-2"><Icon name="Zap" size={16}/> Absolute Mode</h5>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
            {[{value:'open',title:'Open Scoring',desc:'Any value up to a max.'},{value:'fixed',title:'Fixed Values',desc:'Pick from preset list.'}].map(opt=>(
              <button key={opt.value} onClick={()=>upd({absoluteType:opt.value})}
                className={`p-4 rounded-xl border-2 text-left transition-all ${f.absoluteType===opt.value?'border-blue-500 bg-blue-100':'bg-white border-slate-200 opacity-60 hover:opacity-80'}`}>
                <div className="font-bold text-slate-900 text-sm">{opt.title}</div>
                <div className="text-xs text-slate-500 mt-1">{opt.desc}</div>
              </button>
            ))}
          </div>
          {f.absoluteType==='open'&&(
            <div className="flex items-center gap-3 bg-white p-3 rounded-lg border border-blue-100">
              <label className="text-xs font-bold text-slate-600 uppercase whitespace-nowrap">Max Score:</label>
              <input type="number" className="w-28 p-2 border border-slate-200 rounded text-center font-bold focus:outline-none"
                value={f.maxScore} onChange={e=>upd({maxScore:parseFloat(e.target.value)||0})}/>
              <span className="text-xs text-slate-400">points</span>
            </div>
          )}
          {f.absoluteType==='fixed'&&(
            <div className="space-y-2">
              {(f.fixedValues||[]).map((val,idx)=>(
                <div key={idx} className="flex items-end gap-3 bg-white p-3 rounded-lg border border-blue-100">
                  <div className="flex-1">
                    <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Point Value</label>
                    <input type="number" className="w-full p-2 border border-slate-200 rounded bg-emerald-50 text-emerald-700 font-bold text-sm focus:outline-none"
                      value={val} onChange={e=>updFix(idx,e.target.value)}/>
                  </div>
                  <button onClick={()=>remFix(idx)} className="p-2 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={15}/></button>
                </div>
              ))}
              <button onClick={addFix} className="w-full py-2.5 border-2 border-dashed border-blue-200 rounded-lg text-blue-600 text-xs font-bold hover:bg-blue-100 flex items-center justify-center gap-1.5">
                <Icon name="ListPlus" size={14}/> Add Value
              </button>
            </div>
          )}
        </div>
      )}
      {f.method==='fractional'&&(
        <div className="bg-violet-50 p-5 rounded-xl border border-violet-100 space-y-4">
          <div className="flex justify-between items-center">
            <h5 className="text-sm font-bold text-violet-900 flex items-center gap-2"><Icon name="Award" size={16}/> Fractional Brackets</h5>
            <div className="flex items-center gap-2">
              <label className="text-xs font-bold text-violet-700 uppercase">Top Bonus:</label>
              <input type="number" className="w-16 p-1 border border-violet-200 rounded text-center text-sm font-bold bg-white focus:outline-none"
                value={f.leaderBonus} onChange={e=>upd({leaderBonus:parseFloat(e.target.value)||0})}/>
              <span className="text-xs text-violet-500">pts</span>
            </div>
          </div>
          <p className="text-xs text-violet-600 bg-violet-100 rounded-lg px-3 py-2">First bracket = best group. Remainders go to top bracket.</p>
          <div className="space-y-2">
            {(f.fracBrackets||[]).map((b,idx)=>(
              <div key={idx} className="flex items-end gap-3 bg-white p-3 rounded-lg border border-violet-100">
                <div className="flex-1">
                  <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Label</label>
                  <input type="text" className="w-full p-2 border border-slate-200 rounded bg-slate-50 text-sm focus:outline-none"
                    value={b.label} onChange={e=>updFrac(idx,'label',e.target.value)}/>
                </div>
                <div className="w-24">
                  <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Points</label>
                  <input type="number" className="w-full p-2 border border-emerald-200 rounded bg-emerald-50 text-emerald-700 font-bold text-sm focus:outline-none"
                    value={b.points} onChange={e=>updFrac(idx,'points',e.target.value)}/>
                </div>
                <button onClick={()=>remFrac(idx)} className="p-2 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={15}/></button>
              </div>
            ))}
            <button onClick={addFrac} className="w-full py-2.5 border-2 border-dashed border-violet-200 rounded-lg text-violet-600 text-xs font-bold hover:bg-violet-100 flex items-center justify-center gap-1.5">
              <Icon name="ListPlus" size={14}/> Add Bracket
            </button>
          </div>
        </div>
      )}
      {f.method==='relative'&&(
        <div className="bg-amber-50 p-5 rounded-xl border border-amber-100 space-y-4">
          <div className="flex justify-between items-center">
            <h5 className="text-sm font-bold text-amber-900 flex items-center gap-2"><Icon name="Award" size={16}/> Proximity Tiers</h5>
            <div className="flex items-center gap-2">
              <label className="text-xs font-bold text-amber-700 uppercase">Winner Bonus:</label>
              <input type="number" className="w-16 p-1 border border-amber-200 rounded text-center text-sm font-bold bg-white focus:outline-none"
                value={f.leaderBonus} onChange={e=>upd({leaderBonus:parseFloat(e.target.value)||0})}/>
            </div>
          </div>
          <div className="space-y-2">
            {[...f.tiers].sort((a,b)=>a.threshold-b.threshold).map((tier,idx)=>(
              <div key={idx} className="flex items-end gap-3 bg-white p-3 rounded-lg border border-amber-100">
                <div className="flex-1">
                  <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Within (units)</label>
                  <input type="number" className="w-full p-2 border border-slate-200 rounded bg-slate-50 text-sm focus:outline-none"
                    value={tier.threshold} onChange={e=>updTier(idx,'threshold',e.target.value)}/>
                </div>
                <div className="w-24">
                  <label className="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Points</label>
                  <input type="number" className="w-full p-2 border border-emerald-200 rounded bg-emerald-50 text-emerald-700 font-bold text-sm focus:outline-none"
                    value={tier.points} onChange={e=>updTier(idx,'points',e.target.value)}/>
                </div>
                <button onClick={()=>remTier(idx)} className="p-2 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={15}/></button>
              </div>
            ))}
            <button onClick={addTier} className="w-full py-2.5 border-2 border-dashed border-amber-200 rounded-lg text-amber-600 text-xs font-bold hover:bg-amber-100 flex items-center justify-center gap-1.5">
              <Icon name="ListPlus" size={14}/> Add Tier
            </button>
          </div>
        </div>
      )}
      <div>
        <label className="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Judge Instructions</label>
        <textarea className="w-full p-2.5 border border-slate-200 rounded-lg h-20 resize-none focus:border-emerald-400 outline-none text-sm"
          placeholder="What should the judge measure?" value={f.instructions} onChange={e=>upd({instructions:e.target.value})}/>
      </div>
      <div className="flex gap-3">
        <button onClick={onCancel} className="px-5 py-2.5 border border-slate-200 rounded-xl text-slate-600 font-semibold hover:bg-slate-50 text-sm">Cancel</button>
        <button onClick={()=>onSave(f)} disabled={!f.name.trim()}
          className="flex-1 py-2.5 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 disabled:opacity-40 transition-all text-sm">
          {initial?'Save Changes':'Create Challenge'}
        </button>
      </div>
    </div>
  );
}

function ChallengesView({ districtId, compId }) {
  const [challenges,setChallenges]=useState([]);
  const [showAdd,setShowAdd]=useState(false);
  const [editing,setEditing]=useState(null);
  useEffect(()=>{
    if(!compId)return;
    const ref=challengesRef(districtId,compId);
    const h=snap=>setChallenges(toArr(snap));
    ref.on('value',h);return()=>ref.off('value',h);
  },[districtId,compId]);
  const saveChallenge=async data=>{
    try{
      if(editing){await challengesRef(districtId,compId).child(editing.id).update({...data,updatedAt:new Date().toISOString()});setEditing(null);}
      else{await challengesRef(districtId,compId).push({...data,createdAt:new Date().toISOString()});setShowAdd(false);}
    }catch(e){console.error(e);}
  };
  const deleteChallenge=async id=>{if(!window.confirm('Delete this challenge?'))return;try{await challengesRef(districtId,compId).child(id).remove();}catch(e){console.error(e);}};
  return(
    <div className="space-y-6">
      <div className="flex justify-between items-center">
        <div><h3 className="text-lg font-bold text-slate-800">Challenges</h3><p className="text-sm text-slate-500">{challenges.length} challenge{challenges.length!==1?'s':''}</p></div>
        <button onClick={()=>{setShowAdd(!showAdd);setEditing(null);}}
          className={`px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-bold shadow-sm ${showAdd?'bg-slate-200 text-slate-700':'bg-emerald-600 text-white hover:bg-emerald-700'}`}>
          {showAdd?'Cancel':<><Icon name="Plus" size={16}/> Add Challenge</>}
        </button>
      </div>
      {showAdd&&!editing&&<ChallengeForm onSave={saveChallenge} onCancel={()=>setShowAdd(false)}/>}
      {editing&&<ChallengeForm initial={editing} onSave={saveChallenge} onCancel={()=>setEditing(null)}/>}
      {challenges.length===0&&!showAdd&&(
        <div className="text-center py-16 bg-white rounded-xl border border-slate-200">
          <Icon name="Zap" size={36} className="mx-auto text-slate-300 mb-4"/>
          <p className="text-slate-500 font-medium">No challenges yet.</p>
        </div>
      )}
      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {challenges.map(ch=>(
          <div key={ch.id} className="bg-white p-5 rounded-xl border border-slate-200 hover:border-emerald-200 hover:shadow-md transition-all shadow-sm">
            <div className="flex justify-between items-start mb-3">
              <h4 className="font-bold text-slate-900 text-base">{ch.name}</h4>
              <div className="flex gap-1">
                <button onClick={()=>{setEditing(ch);setShowAdd(false);}} className="p-1 text-slate-400 hover:text-blue-500"><Icon name="Edit2" size={14}/></button>
                <button onClick={()=>deleteChallenge(ch.id)} className="p-1 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={15}/></button>
              </div>
            </div>
            <div className="flex gap-2 mb-3 flex-wrap">
              <span className="text-[10px] font-bold uppercase px-2 py-0.5 rounded bg-slate-100 text-slate-500 border border-slate-200">{ch.type}</span>
              <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded border ${ch.method==='relative'?'bg-amber-50 text-amber-600 border-amber-100':ch.method==='fractional'?'bg-violet-50 text-violet-600 border-violet-100':'bg-blue-50 text-blue-600 border-blue-100'}`}>{ch.method}</span>
            </div>
            {ch.instructions&&<p className="text-xs text-slate-400 italic">{ch.instructions}</p>}
          </div>
        ))}
      </div>
    </div>
  );
}

function SchoolsView({ districtId, competitions }) {
  const [schools,setSchools]=useState([]);
  const [coaches,setCoaches]=useState([]);
  const [exp,setExp]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState('');
  const [addTo,setAddTo]=useState(null);
  const [nc,setNc]=useState({name:'',email:''});
  const [saving,setSaving]=useState(false);
  useEffect(()=>{
    const sr=schoolsRef(districtId),cr=coachesRef(districtId);
    const sh=s=>setSchools(toArr(s)),ch=s=>setCoaches(toArr(s));
    sr.on('value',sh);cr.on('value',ch);return()=>{sr.off('value',sh);cr.off('value',ch);};
  },[districtId]);
  const addSchool=async()=>{if(!newName.trim())return;setSaving(true);try{await schoolsRef(districtId).push({name:newName.trim(),createdAt:new Date().toISOString()});setNewName('');setShowAdd(false);}catch(e){console.error(e);}setSaving(false);};
  const delSchool=async id=>{if(!window.confirm('Delete this school?'))return;try{coaches.filter(c=>c.schoolIds?.includes(id)).forEach(async c=>{const r=(c.schoolIds||[]).filter(s=>s!==id);r.length===0?await coachesRef(districtId).child(c.id).remove():await coachesRef(districtId).child(c.id).update({schoolIds:r});});await schoolsRef(districtId).child(id).remove();}catch(e){console.error(e);}};
  const addCoach=async schoolId=>{if(!nc.name.trim()||!nc.email.trim())return;setSaving(true);try{const email=nc.email.trim().toLowerCase();const ex=coaches.find(c=>c.email?.toLowerCase()===email);if(ex){const ids=[...new Set([...(ex.schoolIds||[]),schoolId])];await coachesRef(districtId).child(ex.id).update({schoolIds:ids,name:nc.name.trim()});}else{await coachesRef(districtId).push({name:nc.name.trim(),email,schoolIds:[schoolId],createdAt:new Date().toISOString()});}const key=encodeEmail(email);await db.ref(`userRoles/${key}`).once('value').then(s=>{if(!s.val())return db.ref(`userRoles/${key}`).set({role:'coach',districtId,email,addedAt:new Date().toISOString()});});setAddTo(null);setNc({name:'',email:''});}catch(e){console.error(e);}setSaving(false);};
  const [regFor,setRegFor]=useState(null);
  const [regTeamName,setRegTeamName]=useState('');
  const [regStudentCount,setRegStudentCount]=useState('');
  const [regCompId,setRegCompId]=useState('');
  const [regSaving,setRegSaving]=useState(false);
  const submitAdminReg=async()=>{
    if(!regTeamName.trim()||!regCompId||regSaving)return;
    setRegSaving(true);
    try{
      const numRef=compNumRef(districtId,regCompId);
      const tx=await numRef.transaction(n=>(n||0)+1);
      const comp=competitions.find(c=>c.id===regCompId);
      await compRegsRef(districtId,regCompId).push({teamNumber:tx.snapshot.val(),teamName:regTeamName.trim(),schoolId:regFor.school.id,schoolName:regFor.school.name,studentCount:parseInt(regStudentCount)||0,coachEmail:regFor.coach.email,coachName:regFor.coach.name,competitionId:regCompId,competitionName:comp?.name||'',registeredAt:new Date().toISOString()});
      setRegFor(null);setRegTeamName('');setRegStudentCount('');setRegCompId('');
    }catch(e){console.error(e);}
    setRegSaving(false);
  };
  const remCoach=async(coach,schoolId)=>{
    if(!window.confirm(`Remove ${coach.name} from this school?`))return;
    try{
      const ids=(coach.schoolIds||[]).filter(s=>s!==schoolId);
      if(ids.length===0){await coachesRef(districtId).child(coach.id).remove();}
      else{await coachesRef(districtId).child(coach.id).update({schoolIds:ids});}
    }catch(e){console.error(e);}
  };
  return(
    <div className="space-y-4">
      <div className="flex justify-between items-center">
        <div><h3 className="text-lg font-bold text-slate-800">Schools & Coaches</h3><p className="text-sm text-slate-500">{schools.length} school{schools.length!==1?'s':''}</p></div>
        <button onClick={()=>setShowAdd(!showAdd)} className={`px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-bold shadow-sm ${showAdd?'bg-slate-200 text-slate-700':'bg-blue-600 text-white hover:bg-blue-700'}`}>
          {showAdd?'Cancel':<><Icon name="Plus" size={16}/> Add School</>}
        </button>
      </div>
      {showAdd&&(<div className="bg-white p-4 rounded-xl border-2 border-blue-100 shadow-md flex gap-3">
        <input className="flex-1 p-2.5 border border-slate-200 rounded-lg focus:border-blue-400 outline-none" placeholder="School name" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addSchool()}/>
        <button onClick={addSchool} disabled={!newName.trim()||saving} className="px-5 py-2.5 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 disabled:opacity-40">Add</button>
      </div>)}
      {schools.map(school=>{
        const sc=coaches.filter(c=>c.schoolIds?.includes(school.id));
        const open=exp===school.id;
        return(
          <div key={school.id} className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
            <div className="flex items-center justify-between px-5 py-4">
              <button className="flex items-center gap-3 flex-1 text-left" onClick={()=>setExp(open?null:school.id)}>
                <div className="bg-blue-100 text-blue-600 p-2 rounded-lg"><Icon name="School" size={16}/></div>
                <div><div className="font-bold text-slate-900">{school.name}</div><div className="text-xs text-slate-400">{sc.length} coach{sc.length!==1?'es':''}</div></div>
                <Icon name={open?'ChevronDown':'ChevronRight'} size={16} className="text-slate-400 ml-2"/>
              </button>
              <div className="flex items-center gap-2">
                <button onClick={()=>{setAddTo(school.id);setExp(school.id);}} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg border border-blue-100"><Icon name="UserPlus" size={13}/> Add Coach</button>
                <button onClick={()=>delSchool(school.id)} className="p-1.5 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={15}/></button>
              </div>
            </div>
            {open&&(
              <div className="border-t border-slate-100 px-5 py-4 bg-slate-50 space-y-3">
                {addTo===school.id&&(
                  <div className="bg-white p-4 rounded-xl border-2 border-blue-100 space-y-3">
                    <h5 className="text-sm font-bold text-slate-700">Add Coach to {school.name}</h5>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      <div><label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Full Name</label><input className="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-400" placeholder="Coach name" value={nc.name} onChange={e=>setNc({...nc,name:e.target.value})}/></div>
                      <div><label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Gmail Address</label><input type="email" className="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-400" placeholder="coach@gmail.com" value={nc.email} onChange={e=>setNc({...nc,email:e.target.value})}/></div>
                    </div>
                    <div className="flex gap-2 justify-end">
                      <button onClick={()=>{setAddTo(null);setNc({name:'',email:''}); }} className="px-4 py-2 text-sm text-slate-500 font-semibold">Cancel</button>
                      <button onClick={()=>addCoach(school.id)} disabled={!nc.name.trim()||!nc.email.trim()||saving} className="px-5 py-2 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700 disabled:opacity-40">Save Coach</button>
                    </div>
                  </div>
                )}
                {sc.length===0&&addTo!==school.id&&<p className="text-xs text-slate-400 italic text-center py-2">No coaches added yet.</p>}
                {sc.map(coach=>(
                  <div key={coach.id}>
                    <div className="flex items-center justify-between bg-white px-4 py-3 rounded-lg border border-slate-200">
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500"><Icon name="Users" size={14}/></div>
                        <div><div className="text-sm font-semibold text-slate-800">{coach.name}</div><div className="text-xs text-slate-400 flex items-center gap-1"><Icon name="Mail" size={10}/> {coach.email}</div></div>
                      </div>
                      <div className="flex items-center gap-1">
                        <button onClick={()=>{setRegFor(regFor?.coach.id===coach.id?null:{coach,school});setRegTeamName('');setRegStudentCount('');}} className="flex items-center gap-1 px-2.5 py-1.5 text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-lg border border-blue-200 transition-colors"><Icon name="Plus" size={12}/> Register Team</button>
                        <button onClick={()=>remCoach(coach,school.id)} className="p-1.5 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={14}/></button>
                      </div>
                    </div>
                    {regFor?.coach.id===coach.id&&regFor?.school.id===school.id&&(
                      <div className="mt-1 p-4 bg-blue-50 border border-blue-200 rounded-lg space-y-3">
                        <p className="text-xs font-bold text-blue-700 uppercase">Register team for {coach.name}</p>
                        <div>
                          <label className="text-xs font-bold text-slate-500 uppercase">Competition</label>
                          <select className="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:border-blue-400 outline-none" value={regCompId} onChange={e=>setRegCompId(e.target.value)}>
                            <option value="">— select competition —</option>
                            {competitions.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                          </select>
                        </div>
                        <input autoFocus className="w-full p-2.5 border border-slate-200 rounded-lg text-sm focus:border-blue-400 outline-none" placeholder="Team name" value={regTeamName} onChange={e=>setRegTeamName(e.target.value)}/>
                        <div>
                          <label className="text-xs font-bold text-slate-500 uppercase">Number of Students</label>
                          <input type="number" min="1" max="99" className="w-full p-2 border border-slate-200 rounded-lg text-sm focus:border-blue-400 outline-none" placeholder="e.g. 4" value={regStudentCount} onChange={e=>setRegStudentCount(e.target.value)}/>
                        </div>
                        <div className="flex gap-2">
                          <button onClick={submitAdminReg} disabled={!regTeamName.trim()||!regCompId||regSaving} className="px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded-lg hover:bg-blue-700 disabled:opacity-40">{regSaving?'Saving...':'Register Team'}</button>
                          <button onClick={()=>setRegFor(null)} className="px-4 py-2 text-sm text-slate-500 hover:text-slate-800 font-semibold">Cancel</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function ScoresView({ districtId, compId }) {
  const [challenges,setChallenges]=useState([]);
  const [scores,setScores]=useState([]);
  const [regs,setRegs]=useState([]);
  const [selCh,setSelCh]=useState('');
  const [editing,setEditing]=useState(null);
  const [newVal,setNewVal]=useState('');
  const isFB=t=>t==='time-fast';
  const isT=t=>t?.includes('time');
  useEffect(()=>{
    if(!compId)return;
    const cr=challengesRef(districtId,compId),sr=compScoresRef(districtId,compId),rr=compRegsRef(districtId,compId);
    const ch=s=>setChallenges(toArr(s)),sh=s=>setScores(toArr(s)),rh=s=>setRegs(toArr(s));
    cr.on('value',ch);sr.on('value',sh);rr.on('value',rh);
    return()=>{cr.off('value',ch);sr.off('value',sh);rr.off('value',rh);};
  },[districtId,compId]);
  const ev=challenges.find(e=>e.id===selCh);
  const evScores=scores.filter(s=>s.challengeId===selCh||s.eventId===selCh).sort((a,b)=>ev?(isFB(ev.type)?a.rawValue-b.rawValue:b.rawValue-a.rawValue):0);
  const saveEdit=async()=>{const n=parseFloat(newVal);if(isNaN(n))return;try{await compScoresRef(districtId,compId).child(editing).update({rawValue:n,updatedAt:new Date().toISOString()});}catch(e){console.error(e);}setEditing(null);setNewVal('');};
  const delScore=async id=>{if(!window.confirm('Delete this score?'))return;try{await compScoresRef(districtId,compId).child(id).remove();}catch(e){console.error(e);}};
  return(
    <div className="space-y-5">
      <div><h3 className="text-lg font-bold text-slate-800">Scores</h3><p className="text-sm text-slate-500">View and edit submitted scores.</p></div>
      <select className="p-2.5 border border-slate-200 rounded-lg text-sm w-full sm:w-80 focus:border-blue-400 outline-none" value={selCh} onChange={e=>setSelCh(e.target.value)}>
        <option value="">Select a challenge...</option>
        {challenges.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
      </select>
      {ev&&evScores.length===0&&<div className="text-center py-12 bg-white rounded-xl border border-slate-200"><p className="text-slate-400">No scores for this challenge yet.</p></div>}
      {ev&&evScores.length>0&&(
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div className="overflow-x-auto">
            <table className="w-full text-left min-w-[500px]">
              <thead className="text-xs text-slate-400 uppercase font-semibold bg-slate-50 border-b border-slate-100">
                <tr><th className="px-5 py-3">Rank</th><th className="px-5 py-3">Team</th><th className="px-5 py-3">School</th><th className="px-5 py-3">Value</th><th className="px-5 py-3">Actions</th></tr>
              </thead>
              <tbody className="divide-y divide-slate-100">
                {evScores.map((s,i)=>{
                  const team=regs.find(r=>r.id===s.teamId);
                  return(
                    <tr key={s.id} className="hover:bg-slate-50">
                      <td className="px-5 py-3 font-black text-slate-500">#{i+1}</td>
                      <td className="px-5 py-3 font-semibold text-slate-900 text-sm">{team?.teamName||s.teamId}</td>
                      <td className="px-5 py-3 text-xs text-slate-500">{team?.schoolName||''}</td>
                      <td className="px-5 py-3">{editing===s.id?(
                        <div className="flex items-center gap-2">
                          <input type="number" step="0.01" autoFocus className="w-28 p-1.5 border-2 border-blue-400 rounded font-bold text-sm focus:outline-none"
                            value={newVal} onChange={e=>setNewVal(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveEdit();if(e.key==='Escape'){setEditing(null);setNewVal('');}}}/>
                          <button onClick={saveEdit} className="text-emerald-600 font-bold text-xs px-2 py-1 bg-emerald-50 rounded hover:bg-emerald-100">Save</button>
                          <button onClick={()=>{setEditing(null);setNewVal('');}} className="text-slate-400 text-xs px-2 py-1 hover:text-slate-600">Cancel</button>
                        </div>
                      ):(
                        <span className="font-mono font-bold text-emerald-700">{s.rawValue}{isT(ev.type)?'s':''}</span>
                      )}</td>
                      <td className="px-5 py-3">
                        <div className="flex gap-2">
                          <button onClick={()=>{setEditing(s.id);setNewVal(String(s.rawValue));}} className="p-1.5 text-slate-400 hover:text-blue-500"><Icon name="Edit2" size={14}/></button>
                          <button onClick={()=>delScore(s.id)} className="p-1.5 text-slate-400 hover:text-red-500"><Icon name="Trash2" size={14}/></button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function RegistrationsView({ districtId, compId }) {
  const [regs,setRegs]=useState([]);
  const [search,setSearch]=useState('');
  const [editId,setEditId]=useState(null);
  const [editName,setEditName]=useState('');
  const [editStudentCount,setEditStudentCount]=useState('');
  const [editSaving,setEditSaving]=useState(false);
  useEffect(()=>{
    if(!compId)return;
    const ref=compRegsRef(districtId,compId);
    const h=s=>setRegs(toArr(s));ref.on('value',h);return()=>ref.off('value',h);
  },[districtId,compId]);
  const filt=regs.filter(r=>!search||String(r.teamNumber||'').includes(search)||r.teamName?.toLowerCase().includes(search.toLowerCase())||r.schoolName?.toLowerCase().includes(search.toLowerCase())||r.coachEmail?.toLowerCase().includes(search.toLowerCase()));
  const startEdit=r=>{setEditId(r.id);setEditName(r.teamName);setEditStudentCount(String(r.studentCount||''));};
  const cancelEdit=()=>{setEditId(null);setEditName('');setEditStudentCount('');};
  const saveEdit=async()=>{
    if(!editName.trim()||editSaving)return;
    setEditSaving(true);
    try{await compRegsRef(districtId,compId).child(editId).update({teamName:editName.trim(),studentCount:parseInt(editStudentCount)||0});cancelEdit();}
    catch(e){console.error(e);}
    setEditSaving(false);
  };
  const deleteReg=async r=>{
    if(!window.confirm(`Delete "${r.teamName}"? This cannot be undone.`))return;
    try{await compRegsRef(districtId,compId).child(r.id).remove();}catch(e){console.error(e);}
  };
  return(
    <div className="space-y-4">
      <div className="flex flex-col sm:flex-row sm:items-center gap-3 justify-between">

                    <div className="text-xs text-slate-500 mt-0.5">{r.coachName&&<span>{r.coachName} · </span>}{r.coachEmail}</div>

function CompetitionsView({ districtId, onManage }) {
  const [comps,setComps]=useState([]);
  const [showAdd,setShowAdd]=useState(false);
  const [newName,setNewName]=useState('');
  const [saving,setSaving]=useState(false);
  useEffect(()=>{
    const ref=competitionsRef(districtId);
    const h=s=>setComps(toArr(s));
    ref.on('value',h);return()=>ref.off('value',h);
  },[districtId]);
  const createComp=async()=>{
    if(!newName.trim()||saving)return;
    setSaving(true);
    try{
      await competitionsRef(districtId).push({name:newName.trim(),registrationOpen:true,scoringOpen:false,scoreboardPublic:true,createdAt:new Date().toISOString()});
      setNewName('');setShowAdd(false);
    }catch(e){console.error(e);}
    setSaving(false);
  };
  const toggle=async(comp,field)=>{
    try{await competitionsRef(districtId).child(comp.id).update({[field]:!comp[field]});}catch(e){console.error(e);}
  };
  const deleteComp=async comp=>{
    if(!window.confirm(`Delete "${comp.name}" and ALL its data (challenges, registrations, scores)? This cannot be undone.`))return;
    try{await competitionsRef(districtId).child(comp.id).remove();}catch(e){console.error(e);}
  };
  return(
    <div className="space-y-6">
      <div className="flex justify-between items-center">
        <div><h3 className="text-lg font-bold text-slate-800">Competitions</h3><p className="text-sm text-slate-500">{comps.length} competition{comps.length!==1?'s':''}</p></div>
        <button onClick={()=>setShowAdd(!showAdd)}
          className={`px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-bold shadow-sm ${showAdd?'bg-slate-200 text-slate-700':'bg-amber-500 text-white hover:bg-amber-600'}`}>
          {showAdd?'Cancel':<><Icon name="Plus" size={16}/> New Competition</>}
        </button>
      </div>
      {showAdd&&(
        <div className="bg-white p-5 rounded-xl border-2 border-amber-100 shadow-md flex gap-3">
          <input autoFocus className="flex-1 p-2.5 border border-slate-200 rounded-lg focus:border-amber-400 outline-none" placeholder="Competition name (e.g. Spring 2025)" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&createComp()}/>
          <button onClick={createComp} disabled={!newName.trim()||saving} className="px-5 py-2.5 bg-amber-500 text-white font-bold rounded-lg hover:bg-amber-600 disabled:opacity-40">Create</button>
        </div>
      )}
      {comps.length===0&&!showAdd&&(
        <div className="text-center py-16 bg-white rounded-xl border border-slate-200">
          <Icon name="Calendar" size={36} className="mx-auto text-slate-300 mb-4"/>
          <p className="text-slate-500 font-medium">No competitions yet.</p>
          <p className="text-xs text-slate-400 mt-1">Create a competition to get started.</p>
        </div>
      )}
      <div className="space-y-4">
        {comps.map(comp=>(
          <div key={comp.id} className="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
            <div className="flex items-start justify-between gap-4 flex-wrap">
              <div className="flex-1 min-w-0">
                <h4 className="font-bold text-slate-900 text-base">{comp.name}</h4>
                <div className="flex flex-wrap gap-2 mt-2">
                  <button onClick={()=>toggle(comp,'registrationOpen')}
                    className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold border transition-all ${comp.registrationOpen?'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-slate-100 text-slate-500 border-slate-200'}`}>
                    <span className={`inline-block w-1.5 h-1.5 rounded-full ${comp.registrationOpen?'bg-emerald-500':'bg-slate-400'}`}/>
                    Registration {comp.registrationOpen?'Open':'Closed'}
                  </button>
                  <button onClick={()=>toggle(comp,'scoringOpen')}
                    className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold border transition-all ${comp.scoringOpen?'bg-blue-50 text-blue-700 border-blue-200':'bg-slate-100 text-slate-500 border-slate-200'}`}>
                    <span className={`inline-block w-1.5 h-1.5 rounded-full ${comp.scoringOpen?'bg-blue-500':'bg-slate-400'}`}/>
                    Scoring {comp.scoringOpen?'Open':'Closed'}
                  </button>
                </div>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                <button onClick={()=>onManage(comp)} className="flex items-center gap-1.5 px-4 py-2 bg-amber-500 text-white text-sm font-bold rounded-lg hover:bg-amber-600">
                  <Icon name="Settings" size={14}/> Manage →
                </button>
                <button onClick={()=>deleteComp(comp)} className="p-2 text-slate-300 hover:text-red-500 transition-colors">
                  <Icon name="Trash2" size={16}/>
                </button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function LinksView({ districtId, comp }) {
  const [copied,setCopied]=useState('');
  const [saved,setSaved]=useState(false);
  const base=`${location.origin}${location.pathname.replace(/[^/]*$/,'')}`;
  const judgingUrl=`${base}judging.html?district=${districtId}&competition=${comp.id}`;
  const scoreboardUrl=`${base}scoreboard.html?district=${districtId}&competition=${comp.id}`;
  const copy=(url,key)=>{navigator.clipboard.writeText(url).then(()=>{setCopied(key);setTimeout(()=>setCopied(''),2000);}).catch(()=>{});}
  const togglePublic=async()=>{
    try{await competitionsRef(districtId).child(comp.id).update({scoreboardPublic:!comp.scoreboardPublic});setSaved(true);setTimeout(()=>setSaved(false),2000);}catch(e){console.error(e);}
  };
  return(
    <div className="space-y-6 max-w-lg">
      <div><h3 className="text-lg font-bold text-slate-800">Links & Settings</h3><p className="text-sm text-slate-500">Share these with judges and participants.</p></div>
      <div className="bg-white rounded-xl border border-slate-200 p-6 space-y-4 shadow-sm">
        <p className="text-xs font-bold text-slate-500 uppercase tracking-wide">Shareable Links — {comp.name}</p>
        {[{label:'Judging Panel',url:judgingUrl,key:'judging',color:'text-emerald-600',icon:'Award'},{label:'Scoreboard',url:scoreboardUrl,key:'scoreboard',color:'text-slate-700',icon:'BarChart2'}].map(({label,url,key,color,icon})=>(
          <div key={key} className="space-y-1.5">
            <div className="flex items-center gap-2 text-sm font-semibold text-slate-700"><Icon name={icon} size={14} className={color}/>{label}</div>
            <div className="flex items-center gap-2">
              <code className="flex-1 text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-600 truncate font-mono">{url}</code>
              <button onClick={()=>copy(url,key)} className={`shrink-0 flex items-center gap-1.5 px-3 py-2 rounded-lg text-xs font-bold border transition-all ${copied===key?'bg-emerald-50 text-emerald-600 border-emerald-200':'bg-white text-slate-600 border-slate-200 hover:border-amber-400 hover:text-amber-600'}`}>
                <Icon name={copied===key?'CheckCircle':'Copy'} size={13}/>{copied===key?'Copied!':'Copy'}
              </button>
            </div>
          </div>
        ))}
      </div>
      <div className="bg-white rounded-xl border border-slate-200 p-6 space-y-4 shadow-sm">
        <div className="flex items-center justify-between">
          <div>
            <div className="font-semibold text-slate-800 flex items-center gap-2"><Icon name={comp.scoreboardPublic!==false?'Eye':'EyeOff'} size={16} className={comp.scoreboardPublic!==false?'text-emerald-600':'text-slate-400'}/> Public Scoreboard</div>
            <p className="text-xs text-slate-500 mt-1">{comp.scoreboardPublic!==false?'Anyone with the link can view standings.':'Scoreboard hidden — admins only.'}</p>
          </div>
          <button onClick={togglePublic} className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${comp.scoreboardPublic!==false?'bg-emerald-500':'bg-slate-300'}`}>
            <span className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform shadow ${comp.scoreboardPublic!==false?'translate-x-6':'translate-x-1'}`}/>
          </button>
        </div>
        {saved&&<p className="text-xs text-emerald-600 font-semibold flex items-center gap-1"><Icon name="CheckCircle" size={12}/> Saved</p>}
      </div>
    </div>
  );
}

function AdminsView({ districtId }) {
  const [admins,setAdmins]=useState([]);
  const [email,setEmail]=useState('');
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  useEffect(()=>{
    const ref=db.ref('userRoles');
    const h=snap=>{const v=snap.val();setAdmins(v?Object.entries(v).filter(([,d])=>d.districtId===districtId&&d.role==='districtAdmin').map(([k,d])=>({key:k,...d})):[]);};
    ref.on('value',h);return()=>ref.off('value',h);
  },[districtId]);
  const addAdmin=async()=>{
    const e=email.trim().toLowerCase();
    if(!e||!e.includes('@')){setErr('Enter a valid email.');return;}
    setSaving(true);setErr('');
    try{
      const key=e.replace(/\./g,',').replace(/@/g,'-at-');
      await db.ref(`userRoles/${key}`).set({role:'districtAdmin',districtId,email:e,addedAt:new Date().toISOString()});
      setEmail('');
    }catch(ex){setErr('Failed to save. Check rules.');console.error(ex);}
    setSaving(false);
  };
  const remove=async key=>{
    if(!window.confirm('Remove this admin?'))return;
    try{await db.ref(`userRoles/${key}`).remove();}catch(ex){console.error(ex);}
  };
  return(
    <div className="space-y-5">
      <div><h3 className="text-lg font-bold text-slate-800">District Admins</h3><p className="text-sm text-slate-500">Admins can manage events, schools, coaches, and scores for this district.</p></div>
      <div className="bg-white p-5 rounded-xl border-2 border-amber-100 shadow-sm space-y-3">
        <label className="text-xs font-bold text-slate-500 uppercase">Add admin by Gmail address</label>
        <div className="flex gap-3">
          <input type="email" className="flex-1 p-2.5 border border-slate-200 rounded-xl focus:border-amber-400 outline-none text-sm" placeholder="admin@gmail.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addAdmin()}/>
          <button onClick={addAdmin} disabled={!email.trim()||saving} className="px-5 py-2.5 bg-amber-500 text-white font-bold rounded-xl hover:bg-amber-600 disabled:opacity-40 text-sm">Add</button>
        </div>
        {err&&<p className="text-xs text-red-500">{err}</p>}
        <p className="text-xs text-slate-400">The person must sign into RoboScore with this Google account to gain access.</p>
      </div>
      {admins.length===0?(
        <div className="text-center py-12 bg-white rounded-xl border border-slate-200"><p className="text-slate-400 text-sm">No district admins yet.</p></div>
      ):(
        <div className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          {admins.map(a=>(
            <div key={a.key} className="flex items-center justify-between px-5 py-4 border-b border-slate-100 last:border-0">
              <div className="flex items-center gap-3">
                <div className="w-8 h-8 bg-amber-100 rounded-full flex items-center justify-center text-amber-600"><Icon name="Shield" size={14}/></div>
                <span className="text-sm font-semibold text-slate-800">{a.email}</span>
              </div>
              <button onClick={()=>remove(a.key)} className="p-1.5 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={15}/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function DistrictAdminPanel({ districtId, districtName, onBack, isSuperAdmin }) {
  const [tab,setTab]=useState('competitions');
  const [comp,setComp]=useState(null);
  const [compTab,setCompTab]=useState('challenges');
  const [competitions,setCompetitions]=useState([]);

  useEffect(()=>{
    const ref=competitionsRef(districtId);
    const h=s=>setCompetitions(toArr(s));
    ref.on('value',h);return()=>ref.off('value',h);

  // Keep comp data in sync when competitions list updates

    if(!comp)return;
    const updated=competitions.find(c=>c.id===comp.id);
    if(updated)setComp(updated);

  const districtTabs=[
    {id:'competitions',label:'Competitions',icon:'Calendar'},

  const compTabs=[
    {id:'challenges',label:'Challenges',icon:'Zap'},
    {id:'registrations',label:'Registrations',icon:'Users'},
    {id:'scores',label:'Scores',icon:'Award'},
    {id:'links',label:'Links & Settings',icon:'Link2'},

    return(
      <div className="max-w-6xl space-y-6">

        <div className="bg-amber-50 border border-amber-200 rounded-xl px-5 py-3 flex items-center gap-3">
          <Icon name="School" size={18} className="text-amber-600"/>
          <div><div className="font-bold text-amber-900">{districtName}</div><div className="text-xs text-amber-700">District Admin Panel</div></div>
        </div>
        <div>
          <button onClick={()=>setComp(null)} className="flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800 font-semibold mb-3">
            <Icon name="ArrowLeft" size={15}/> All Competitions
          </button>
          <div className="bg-amber-50 border border-amber-200 rounded-xl px-5 py-3 flex flex-wrap items-center gap-3">
            <Icon name="Calendar" size={18} className="text-amber-600"/>
            <div className="flex-1 min-w-0">
              <div className="font-bold text-amber-900">{comp.name}</div>
              <div className="flex flex-wrap gap-2 mt-1">
                <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded-full border ${comp.registrationOpen?'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-slate-100 text-slate-500 border-slate-200'}`}>Registration {comp.registrationOpen?'Open':'Closed'}</span>
                <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded-full border ${comp.scoringOpen?'bg-blue-50 text-blue-700 border-blue-200':'bg-slate-100 text-slate-500 border-slate-200'}`}>Scoring {comp.scoringOpen?'Open':'Closed'}</span>

              <Icon name={t.icon} size={15}/> {t.label}
            </button>
          ))}

        {compTab==='challenges'&&<ChallengesView districtId={districtId} compId={comp.id}/>}

        {compTab==='scores'&&<ScoresView districtId={districtId} compId={comp.id}/>}

      <div className="bg-amber-50 border border-amber-200 rounded-xl px-5 py-3 flex items-center gap-3">
        <Icon name="School" size={18} className="text-amber-600"/>
        <div><div className="font-bold text-amber-900">{districtName}</div><div className="text-xs text-amber-700">District Admin Panel</div></div>
      </div>
      <div className="border-b border-slate-200"><nav className="flex gap-1 overflow-x-auto">

          <button key={t.id} onClick={()=>setTab(t.id)}

function SuperAdminPanel() {
  const [districts,setDistricts]=useState([]);
  const [showAdd,setShowAdd]=useState(false);
  const [nd,setNd]=useState({name:'',slug:''});
  const [managing,setManaging]=useState(null);
  const [saving,setSaving]=useState(false);
  useEffect(()=>{const ref=districtsRef();const h=snap=>{const v=snap.val();setDistricts(v?Object.entries(v).map(([id,d])=>({id,name:d.name||id,...d})):[]);};ref.on('value',h);return()=>ref.off('value',h);},[]);
  const createDist=async()=>{
    const slug=(nd.slug.trim().toLowerCase().replace(/\s+/g,'-'))||nd.name.trim().toLowerCase().replace(/\s+/g,'-');
    if(!slug||!nd.name.trim())return;setSaving(true);
    try{await districtRef(slug).set({name:nd.name.trim(),createdAt:new Date().toISOString(),public:{settings:{scoreboardPublic:true}}});setNd({name:'',slug:''});setShowAdd(false);}catch(e){console.error(e);}setSaving(false);
  };
  const delDist=async id=>{if(!window.confirm(`Delete district "${id}" and ALL data? Cannot be undone.`))return;try{await districtRef(id).remove();}catch(e){console.error(e);}};
  if(managing)return <div className="max-w-6xl space-y-6"><DistrictAdminPanel districtId={managing.id} districtName={managing.name} onBack={()=>setManaging(null)} isSuperAdmin={true}/></div>;
  return(
    <div className="max-w-4xl space-y-6">
      <div className="bg-red-50 border border-red-200 rounded-xl px-5 py-3 flex items-center gap-3">
        <Icon name="Shield" size={18} className="text-red-600"/>
        <div><div className="font-bold text-red-900">Super Admin</div><div className="text-xs text-red-700">Full access  manage all districts</div></div>
      </div>
      <div className="flex justify-between items-center">
        <div><h3 className="text-lg font-bold text-slate-800">Districts</h3><p className="text-sm text-slate-500">{districts.length} district{districts.length!==1?'s':''}</p></div>
        <button onClick={()=>setShowAdd(!showAdd)} className={`px-4 py-2 rounded-lg flex items-center gap-2 text-sm font-bold shadow-sm ${showAdd?'bg-slate-200 text-slate-700':'bg-red-600 text-white hover:bg-red-700'}`}>
          {showAdd?'Cancel':<><Icon name="Plus" size={16}/> Add District</>}
        </button>
      </div>
      {showAdd&&(
        <div className="bg-white p-5 rounded-xl border-2 border-red-100 shadow-md space-y-4">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label className="text-xs font-bold text-slate-500 uppercase block mb-1">District Name *</label><input className="w-full p-2.5 border border-slate-200 rounded-lg focus:border-red-400 outline-none" placeholder="e.g. Springfield ISD" value={nd.name} onChange={e=>setNd({...nd,name:e.target.value})}/></div>
            <div><label className="text-xs font-bold text-slate-500 uppercase block mb-1">URL Slug (optional)</label><input className="w-full p-2.5 border border-slate-200 rounded-lg focus:border-red-400 outline-none font-mono text-sm" placeholder="springfield-isd" value={nd.slug} onChange={e=>setNd({...nd,slug:e.target.value})}/><p className="text-[10px] text-slate-400 mt-1">Auto-generated from name if blank.</p></div>
          </div>
          <button onClick={createDist} disabled={!nd.name.trim()||saving} className="px-5 py-2.5 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 disabled:opacity-40 text-sm">Create District</button>
        </div>
      )}
      {districts.length===0&&!showAdd&&(
        <div className="text-center py-16 bg-white rounded-xl border border-slate-200"><Icon name="Globe" size={36} className="mx-auto text-slate-300 mb-4"/><p className="text-slate-500 font-medium">No districts yet.</p></div>
      )}
      <div className="space-y-3">
        {districts.map(d=>(
          <div key={d.id} className="bg-white rounded-xl border border-slate-200 shadow-sm p-5 flex items-center justify-between">
            <div><div className="font-bold text-slate-900">{d.name}</div><div className="text-xs text-slate-400 font-mono mt-0.5">ID: {d.id}</div></div>
            <div className="flex items-center gap-2">
              <button onClick={()=>setManaging({id:d.id,name:d.name})} className="flex items-center gap-1.5 px-4 py-2 bg-amber-500 text-white text-sm font-bold rounded-lg hover:bg-amber-600"><Icon name="Settings" size={14}/> Manage</button>
              <button onClick={()=>delDist(d.id)} className="p-2 text-slate-300 hover:text-red-500"><Icon name="Trash2" size={16}/></button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  const [roleInfo,setRoleInfo]=useState(null);
  const [resolving,setResolving]=useState(false);
  useEffect(()=>{const u=auth.onAuthStateChanged(u=>{setUser(u);setLoading(false);});return()=>u();},[]);
  useEffect(()=>{
    if(!user?.uid){setRoleInfo(null);return;}
    setResolving(true);
    superAdminsRef().child(user.uid).once('value').then(snap=>{
      if(snap.val()===true){setRoleInfo({role:'superAdmin'});setResolving(false);return;}
      return userRolesRef(user.email).once('value').then(async rs=>{
        const r=rs.val();
        if(r?.role==='districtAdmin'&&r?.districtId){
          await db.ref(`userRoleUids/${user.uid}`).set({role:'districtAdmin',districtId:r.districtId});
          let districtName=r.districtId;
          try{const ns=await districtRef(r.districtId).child('name').once('value');if(ns.val())districtName=ns.val();}catch(e){}
          setRoleInfo({role:'districtAdmin',districtId:r.districtId,districtName});setResolving(false);return;
        }
        setRoleInfo({role:'none'});setResolving(false);
      });
    }).catch(e=>{console.error(e);setRoleInfo({role:'none'});setResolving(false);});
  },[user]);
  const signInGoogle=async()=>{try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}catch(e){console.error(e);}};
  const signInMicrosoft=async()=>{try{await auth.signInWithPopup(new firebase.auth.OAuthProvider('microsoft.com'));}catch(e){console.error(e);}};
  const signInEmail=async(em,pw)=>auth.signInWithEmailAndPassword(em,pw);
  const isSignedIn=!!user&&!user.isAnonymous;
  if(loading||resolving||(isSignedIn&&!roleInfo))return<div className="min-h-screen flex items-center justify-center bg-slate-50"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-500"></div></div>;
  if(!isSignedIn)return<LoginView onGoogleSignIn={signInGoogle} onMicrosoftSignIn={signInMicrosoft} onEmailSignIn={signInEmail}/>;
  return(
    <div className="min-h-screen bg-slate-50 flex flex-col">
      <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div className="flex items-center gap-4">
          <a href="index.html" className="flex items-center gap-1.5 text-slate-400 hover:text-slate-700 text-sm font-medium"><Icon name="ArrowLeft" size={16}/> Home</a>
          <div className="w-px h-5 bg-slate-200"/>
          <div className="flex items-center gap-2"><div className="bg-amber-500 p-1.5 rounded-lg text-white"><Icon name="Shield" size={16}/></div><span className="font-bold text-slate-800">Admin Panel</span></div>
          {roleInfo?.role==='superAdmin'&&<span className="text-xs font-bold bg-red-100 text-red-700 border border-red-200 px-2 py-0.5 rounded-full">Super Admin</span>}
        </div>
        <div className="flex items-center gap-3">
          {user.photoURL&&<img src={user.photoURL} className="w-8 h-8 rounded-full" alt={user.displayName}/>}
          <span className="text-sm text-slate-600 hidden sm:block">{user.displayName}</span>
          <button onClick={()=>auth.signOut()} className="flex items-center gap-1.5 px-3 py-1.5 text-sm text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all"><Icon name="LogOut" size={14}/> Sign out</button>
        </div>
      </header>
      <main className="flex-1 p-6 md:p-10">
        {roleInfo?.role==='superAdmin'&&<SuperAdminPanel/>}
        {roleInfo?.role==='districtAdmin'&&<DistrictAdminPanel districtId={roleInfo.districtId} districtName={roleInfo.districtName} onBack={null} isSuperAdmin={false}/>}
        {(roleInfo?.role==='none'||!roleInfo)&&(
          <div className="max-w-md mx-auto mt-20 text-center bg-white rounded-2xl border border-slate-200 p-10 shadow-xl">
            <div className="w-14 h-14 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-5"><Icon name="Lock" size={28}/></div>
            <h2 className="text-xl font-bold text-slate-900 mb-2">Access Denied</h2>
            <p className="text-slate-500 text-sm"><strong>{user?.email}</strong> has not been granted admin access. Contact your super admin.</p>
          </div>
        )}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
