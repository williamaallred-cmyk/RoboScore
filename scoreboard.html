<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>RoboScore - Scoreboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-900">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const firebaseConfig = {
  apiKey: "AIzaSyDCHyAsSgut1ugpDyv0U4gslu1Z_5WOdDk",
  authDomain: "ms-robotics-reg-and-scoring.firebaseapp.com",
  databaseURL: "https://ms-robotics-reg-and-scoring-default-rtdb.firebaseio.com",
  projectId: "ms-robotics-reg-and-scoring",
  appId: "1:1095575706479:web:79266306ca32f4f9bf269a"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const districtId = new URLSearchParams(location.search).get('district');
const compId     = new URLSearchParams(location.search).get('competition');
const toArr = snap => { const v=snap.val(); return v?Object.entries(v).map(([id,d])=>({id,...d})):[];};

const ICONS = {
  Trophy: '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>',
  Award: '<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>',
  ArrowLeft: '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
  AlertCircle: '<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>',
  Lock: '<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
  BarChart2: '<line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/>',
  Star: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>',
  RefreshCw: '<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>',
};

function Icon({ name, size=18, className='' }) {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
      viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      className={className}
      dangerouslySetInnerHTML={{ __html: ICONS[name]||'' }} />
  );
}

function isFast(type) { return type === 'time-fast'; }

function computePoints(ev, rawValue, allScores, teamId) {
  if (!ev) return 0;
  if (ev.method === 'absolute') {
    if (ev.absoluteType === 'fixed') return rawValue;
    return Math.min(rawValue, ev.maxScore || 100);
  }
  if (ev.method === 'relative') {
    const vals = allScores.map(s => s.rawValue).filter(v => v !== undefined);
    if (!vals.length) return 0;
    const best = isFast(ev.type) ? Math.min(...vals) : Math.max(...vals);
    if (rawValue === best) return (ev.leaderBonus || 0) + (ev.tiers?.[0]?.points || 0);
    const diff = isFast(ev.type) ? rawValue - best : best - rawValue;
    const sorted = [...(ev.tiers || [])].sort((a, b) => a.threshold - b.threshold);
    for (const t of sorted) { if (diff <= t.threshold) return t.points; }
    return 0;
  }
  if (ev.method === 'fractional') {
    const ordered = [...allScores].sort((a, b) => isFast(ev.type) ? a.rawValue - b.rawValue : b.rawValue - a.rawValue);
    const n = ordered.length;
    const brackets = ev.fracBrackets || [];
    if (!brackets.length) return 0;
    const groupSize = Math.floor(n / brackets.length);
    const extras = n % brackets.length;
    let cum = 0;
    for (let gi = 0; gi < brackets.length; gi++) {
      const sz = gi < extras ? groupSize + 1 : groupSize;
      const slice = ordered.slice(cum, cum + sz);
      if (slice.find(s => s.teamId === teamId)) {
        return brackets[gi].points + (gi === 0 ? (ev.leaderBonus || 0) : 0);
      }
      cum += sz;
    }
    return 0;
  }
  return 0;
}

function RankBadge({ rank }) {
  const gold = rank === 1, silver = rank === 2, bronze = rank === 3;
  return (
    <div className={`w-8 h-8 rounded-full flex items-center justify-center font-black text-sm ${gold?'bg-yellow-400 text-yellow-900':silver?'bg-slate-300 text-slate-700':bronze?'bg-orange-300 text-orange-900':'bg-slate-700 text-slate-300'}`}>
      {rank <= 3 ? <Icon name="Star" size={14}/> : rank}
    </div>
  );
}

function App() {
  const [events,setEvents]=useState([]);
  const [regs,setRegs]=useState([]);
  const [scores,setScores]=useState([]);
  const [settings,setSettings]=useState(null);
  const [districtName,setDistrictName]=useState('');
  const [compName,setCompName]=useState('');
  const [loading,setLoading]=useState(true);
  const [tab,setTab]=useState('overall');
  const [isAdmin,setIsAdmin]=useState(false);

  useEffect(()=>{
    if(!districtId||!compId){setLoading(false);return;}
    auth.signInAnonymously().catch(console.error);
    const er=db.ref(`districts/${districtId}/public/competitions/${compId}/challenges`);
    const rr=db.ref(`districts/${districtId}/public/competitions/${compId}/registrations`);
    const sr=db.ref(`districts/${districtId}/public/competitions/${compId}/scores`);
    const mr=db.ref(`districts/${districtId}/public/competitions/${compId}`);
    const nr=db.ref(`districts/${districtId}/name`);
    const eh=s=>setEvents(toArr(s));
    const rh=s=>setRegs(toArr(s));
    const sh=s=>setScores(toArr(s));
    const mh=s=>{const v=s.val();if(v){setSettings({scoreboardPublic:v.scoreboardPublic!==false});setCompName(v.name||'');}else{setSettings({scoreboardPublic:true});}};
    const nh=s=>{if(s.val())setDistrictName(s.val());};
    er.on('value',eh);rr.on('value',rh);sr.on('value',sh);mr.on('value',mh);nr.on('value',nh);
    setLoading(false);
    return()=>{er.off('value',eh);rr.off('value',rh);sr.off('value',sh);mr.off('value',mh);nr.off('value',nh);};
  },[]);

  useEffect(()=>{
    const u=auth.onAuthStateChanged(async user=>{
      if(!user||user.isAnonymous){setIsAdmin(false);return;}
      const snap=await db.ref('superAdmins').child(user.uid).once('value');
      if(snap.val()===true){setIsAdmin(true);return;}
      const rs=await db.ref(`userRoles/${user.uid}`).once('value');
      const r=rs.val();
      setIsAdmin(r?.districtId===districtId);
    });
    return()=>u();
  },[]);

  const scoresByEvent = useMemo(()=>{
    const m={};
    events.forEach(ev=>{m[ev.id]=scores.filter(s=>s.challengeId===ev.id||s.eventId===ev.id);});
    return m;
  },[events,scores]);

  const teamPoints = useMemo(()=>{
    const m={};
    regs.forEach(r=>{m[r.id]=0;});
    events.forEach(ev=>{
      const evS=scoresByEvent[ev.id]||[];
      evS.forEach(s=>{
        const pts=computePoints(ev,s.rawValue,evS,s.teamId);
        if(m[s.teamId]===undefined)m[s.teamId]=0;
        m[s.teamId]+=pts;
      });
    });
    return m;
  },[events,scoresByEvent,regs]);

  const overallRanked = useMemo(()=>{
    return [...regs].sort((a,b)=>(teamPoints[b.id]||0)-(teamPoints[a.id]||0)).map((r,i)=>({...r,rank:i+1,points:teamPoints[r.id]||0}));
  },[regs,teamPoints]);

  if(!districtId)return(
    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
      <div className="bg-slate-800 rounded-2xl shadow-xl p-10 max-w-md text-center border border-slate-700">
        <Icon name="AlertCircle" size={40} className="text-red-400 mx-auto mb-4"/>
        <h2 className="text-xl font-bold text-white mb-2">No District Specified</h2>
        <p className="text-slate-400 text-sm">Use the scoreboard link from your district admin.</p>
        <a href="index.html" className="mt-6 inline-flex items-center gap-1.5 text-sm text-blue-400 hover:underline"><Icon name="ArrowLeft" size={14}/> Home</a>
      </div>
    </div>
  );

  if(!compId)return(
    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
      <div className="bg-slate-800 rounded-2xl shadow-xl p-10 max-w-md text-center border border-slate-700">
        <Icon name="AlertCircle" size={40} className="text-red-400 mx-auto mb-4"/>
        <h2 className="text-xl font-bold text-white mb-2">No Competition Specified</h2>
        <p className="text-slate-400 text-sm">Use the scoreboard link for a specific competition.</p>
        <a href="index.html" className="mt-6 inline-flex items-center gap-1.5 text-sm text-blue-400 hover:underline"><Icon name="ArrowLeft" size={14}/> Home</a>
      </div>
    </div>
  );

  if(loading)return<div className="min-h-screen bg-slate-900 flex items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-yellow-400"></div></div>;

  if(settings&&settings.scoreboardPublic===false&&!isAdmin)return(
    <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6">
      <div className="bg-slate-800 rounded-2xl shadow-xl p-10 max-w-md text-center border border-slate-700">
        <Icon name="Lock" size={40} className="text-slate-500 mx-auto mb-4"/>
        <h2 className="text-xl font-bold text-white mb-2">Scoreboard is Private</h2>
        <p className="text-slate-400 text-sm">The district admin has restricted access to the scoreboard.</p>
        <a href="index.html" className="mt-6 inline-flex items-center gap-1.5 text-sm text-slate-400 hover:text-white"><Icon name="ArrowLeft" size={14}/> Home</a>
      </div>
    </div>
  );

  const evTabs=[{id:'overall',name:'Overall',icon:'Trophy'},...events.map(e=>({id:e.id,name:e.name,icon:'Award'}))];

  return(
    <div className="min-h-screen bg-slate-900 flex flex-col">
      <header className="bg-slate-800 border-b border-slate-700 px-6 py-4 flex items-center gap-4">
        <a href="index.html" className="flex items-center gap-1.5 text-slate-400 hover:text-white text-sm font-medium"><Icon name="ArrowLeft" size={16}/> Home</a>
        <div className="w-px h-5 bg-slate-700"/>
        <div className="flex items-center gap-2"><div className="bg-yellow-500 p-1.5 rounded-lg text-slate-900"><Icon name="Trophy" size={16}/></div><span className="font-bold text-white">{districtName||districtId}{compName?` — ${compName}`:''} · Scoreboard</span></div>
        {isAdmin&&<span className="text-[10px] font-bold bg-red-900 text-red-300 border border-red-700 px-2 py-0.5 rounded-full ml-auto">Admin View</span>}
      </header>
      <nav className="bg-slate-800 border-b border-slate-700 px-4 overflow-x-auto">
        <div className="flex gap-1">
          {evTabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={`flex items-center gap-2 px-4 py-3 text-sm font-semibold border-b-2 transition-all whitespace-nowrap ${tab===t.id?'border-yellow-400 text-yellow-300':'border-transparent text-slate-400 hover:text-white'}`}>
              <Icon name={t.icon} size={14}/> {t.name}
            </button>
          ))}
        </div>
      </nav>
      <main className="flex-1 p-6 md:p-10 max-w-3xl mx-auto w-full">
        {tab==='overall'&&(
          <div className="space-y-3">
            <div className="flex items-center gap-2 mb-6">
              <Icon name="BarChart2" size={18} className="text-yellow-400"/>
              <h2 className="font-bold text-white text-lg">Overall Standings</h2>
              <span className="text-xs text-slate-500 ml-auto">{overallRanked.length} teams</span>
            </div>
            {overallRanked.length===0&&<div className="text-center py-16 bg-slate-800 rounded-2xl border border-slate-700"><p className="text-slate-500">No scores submitted yet.</p></div>}
            {overallRanked.map((team)=>(
              <div key={team.id} className={`flex items-center gap-4 p-5 rounded-2xl border transition-all ${team.rank===1?'bg-yellow-500/10 border-yellow-500/30':team.rank===2?'bg-slate-400/10 border-slate-400/20':team.rank===3?'bg-orange-500/10 border-orange-500/30':'bg-slate-800 border-slate-700'}`}>
                <RankBadge rank={team.rank}/>
                <div className="flex-1 min-w-0">
                  <div className="font-bold text-white truncate">{team.teamName}</div>
                  <div className="text-xs text-slate-400 truncate">{team.schoolName}</div>
                </div>
                <div className="text-right">
                  <div className={`text-2xl font-black ${team.rank===1?'text-yellow-400':team.rank===2?'text-slate-300':team.rank===3?'text-orange-300':'text-slate-300'}`}>{Math.round(team.points)}</div>
                  <div className="text-[10px] text-slate-500 uppercase font-bold">pts</div>
                </div>
              </div>
            ))}
          </div>
        )}
        {tab!=='overall'&&(()=>{
          const ev=events.find(e=>e.id===tab);
          if(!ev)return null;
          const evS=scoresByEvent[ev.id]||[];
          const ranked=[...evS].sort((a,b)=>isFast(ev.type)?a.rawValue-b.rawValue:b.rawValue-a.rawValue).map((s,i)=>({...s,rank:i+1,team:regs.find(r=>r.id===s.teamId),pts:computePoints(ev,s.rawValue,evS,s.teamId)}));
          const isTime=ev.type?.includes('time');
          return(
            <div className="space-y-3">
              <div className="mb-6">
                <h2 className="font-bold text-white text-lg">{ev.name}</h2>
                {ev.instructions&&<p className="text-slate-400 text-xs mt-1">{ev.instructions}</p>}
                <div className="flex gap-2 mt-2">
                  <span className="text-[10px] font-bold uppercase px-2 py-0.5 rounded bg-slate-700 text-slate-400">{ev.type}</span>
                  <span className="text-[10px] font-bold uppercase px-2 py-0.5 rounded bg-slate-700 text-slate-400">{ev.method}</span>
                </div>
              </div>
              {ranked.length===0&&<div className="text-center py-16 bg-slate-800 rounded-2xl border border-slate-700"><p className="text-slate-500">No scores yet.</p></div>}
              {ranked.map(s=>(
                <div key={s.id} className={`flex items-center gap-4 p-5 rounded-2xl border transition-all ${s.rank===1?'bg-yellow-500/10 border-yellow-500/30':s.rank===2?'bg-slate-400/10 border-slate-400/20':s.rank===3?'bg-orange-500/10 border-orange-500/30':'bg-slate-800 border-slate-700'}`}>
                  <RankBadge rank={s.rank}/>
                  <div className="flex-1 min-w-0">
                    <div className="font-bold text-white truncate">{s.team?.teamName||s.teamId}</div>
                    <div className="text-xs text-slate-400 truncate">{s.team?.schoolName}</div>
                  </div>
                  <div className="text-right">
                    <div className="font-mono text-slate-300 text-sm">{s.rawValue}{isTime?'s':''}</div>
                    <div className={`text-xl font-black ${s.rank===1?'text-yellow-400':s.rank===2?'text-slate-300':s.rank===3?'text-orange-300':'text-slate-300'}`}>{Math.round(s.pts)} <span className="text-[10px] text-slate-500 font-bold">pts</span></div>
                  </div>
                </div>
              ))}
            </div>
          );
        })()}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
