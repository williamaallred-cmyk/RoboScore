<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>RoboScore - Judging</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-slate-50">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo } = React;
const firebaseConfig = {
  apiKey: "AIzaSyDCHyAsSgut1ugpDyv0U4gslu1Z_5WOdDk",
  authDomain: "ms-robotics-reg-and-scoring.firebaseapp.com",
  databaseURL: "https://ms-robotics-reg-and-scoring-default-rtdb.firebaseio.com",
  projectId: "ms-robotics-reg-and-scoring",
  appId: "1:1095575706479:web:79266306ca32f4f9bf269a"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const districtId = (new URLSearchParams(location.search).get('district')||'').trim();

const eventsRef = () => db.ref(`districts/${districtId}/public/events`);
const regsRef   = () => db.ref(`districts/${districtId}/public/registrations`);
const scoresRef = () => db.ref(`districts/${districtId}/public/scores`);
const teamScoreRef = (eventId, teamId) => db.ref(`districts/${districtId}/public/scores`);
const toArr = snap => { const v=snap.val(); return v?Object.entries(v).map(([id,d])=>({id,...d})):[];};

const ICONS = {
  Award: '<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>',
  ChevronDown: '<path d="m6 9 6 6 6-6"/>',
  CheckCircle: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>',
  ArrowLeft: '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
  AlertCircle: '<circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>',
  Zap: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  Search: '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
  Trophy: '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>',
  RefreshCw: '<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/>',
};

function Icon({ name, size=18, className='' }) {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
      viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      className={className}
      dangerouslySetInnerHTML={{ __html: ICONS[name]||'' }} />
  );
}

function isFastBetter(type) { return type === 'time-fast'; }
function isScoreBetter(ev, newVal, curVal) {
  if (curVal === undefined || curVal === null) return true;
  return isFastBetter(ev.type) ? newVal < curVal : newVal > curVal;
}

function computePoints(ev, rawValue, allScores) {
  if (!ev) return 0;
  if (ev.method === 'absolute') {
    if (ev.absoluteType === 'fixed') return rawValue;
    return Math.min(rawValue, ev.maxScore || 100);
  }
  if (ev.method === 'relative') {
    const vals = allScores.map(s => s.rawValue).filter(v => v !== undefined);
    if (!vals.length) return 0;
    const best = isFastBetter(ev.type) ? Math.min(...vals) : Math.max(...vals);
    if (rawValue === best) return (ev.leaderBonus || 0) + (ev.tiers?.[0]?.points || 0);
    const diff = isFastBetter(ev.type) ? rawValue - best : best - rawValue;
    const sorted = [...(ev.tiers || [])].sort((a, b) => a.threshold - b.threshold);
    for (const t of sorted) { if (diff <= t.threshold) return t.points; }
    return 0;
  }
  if (ev.method === 'fractional') {
    const ordered = [...allScores].sort((a, b) => isFastBetter(ev.type) ? a.rawValue - b.rawValue : b.rawValue - a.rawValue);
    const n = ordered.length;
    const brackets = ev.fracBrackets || [];
    if (!brackets.length) return 0;
    const groupSize = Math.floor(n / brackets.length);
    const extras = n % brackets.length;
    let cum = 0;
    for (let gi = 0; gi < brackets.length; gi++) {
      const sz = gi < extras ? groupSize + 1 : groupSize;
      const idxs = ordered.slice(cum, cum + sz).map(s => s.teamId);
      if (idxs.includes(allScores.find(s => s.rawValue === rawValue)?.teamId)) {
        const pts = brackets[gi].points;
        const isTop = gi === 0;
        return isTop ? pts + (ev.leaderBonus || 0) : pts;
      }
      cum += sz;
    }
    return 0;
  }
  return 0;
}

function App() {
  const [ready,setReady]=useState(false);
  const [events,setEvents]=useState([]);
  const [regs,setRegs]=useState([]);
  const [scores,setScores]=useState([]);
  const [selEv,setSelEv]=useState('');
  const [search,setSearch]=useState('');
  const [submitting,setSubmitting]=useState({});
  const [inputVals,setInputVals]=useState({});
  const [saved,setSaved]=useState({});

  useEffect(()=>{
    if(!districtId){setReady(true);return;}
    auth.signInAnonymously().catch(console.error);
    const er=eventsRef(),rr=regsRef(),sr=scoresRef();
    const eh=s=>setEvents(toArr(s));
    const rh=s=>setRegs(toArr(s));
    const sh=s=>setScores(toArr(s));
    er.on('value',eh);rr.on('value',rh);sr.on('value',sh);
    setReady(true);
    return()=>{er.off('value',eh);rr.off('value',rh);sr.off('value',sh);};
  },[]);

  const ev=events.find(e=>e.id===selEv);
  const evScores=useMemo(()=>scores.filter(s=>s.eventId===selEv),[scores,selEv]);
  const filtRegs=useMemo(()=>{
    const q=search.toLowerCase();
    const filtered=regs.filter(r=>!q||String(r.teamNumber||'').includes(q)||r.teamName?.toLowerCase().includes(q)||r.schoolName?.toLowerCase().includes(q));
    return [...filtered].sort((a,b)=>(a.teamNumber||9999)-(b.teamNumber||9999));
  },[regs,search]);

  const setInput=(teamId,val)=>setInputVals(v=>({...v,[teamId]:val}));

  const submitScore=async(teamId)=>{
    const raw=parseFloat(inputVals[teamId]);
    if(isNaN(raw)||!selEv)return;
    setSubmitting(s=>({...s,[teamId]:true}));
    try{
      const existingSnap=await scoresRef().orderByChild('eventId').equalTo(selEv).once('value');
      let existing=null;
      existingSnap.forEach(child=>{if(child.val().teamId===teamId){existing={id:child.key,...child.val()};}});
      if(existing){
        if(isScoreBetter(ev,raw,existing.rawValue)){
          await scoresRef().child(existing.id).update({rawValue:raw,updatedAt:new Date().toISOString()});
        }
      }else{
        await scoresRef().push({eventId:selEv,teamId,rawValue:raw,submittedAt:new Date().toISOString()});
      }
      setSaved(s=>({...s,[teamId]:true}));
      setTimeout(()=>setSaved(s=>{const n={...s};delete n[teamId];return n;}),2500);
      setInputVals(v=>{const n={...v};delete n[teamId];return n;});
    }catch(e){console.error(e);}
    setSubmitting(s=>({...s,[teamId]:false}));
  };

  if(!districtId)return(
    <div className="min-h-screen flex items-center justify-center p-6 bg-slate-50">
      <div className="bg-white rounded-2xl shadow-xl p-10 max-w-md text-center border border-red-100">
        <Icon name="AlertCircle" size={40} className="text-red-400 mx-auto mb-4"/>
        <h2 className="text-xl font-bold text-slate-900 mb-2">No District Specified</h2>
        <p className="text-slate-500 text-sm">Use the judging link provided by your district admin (it includes <code className="bg-slate-100 px-1 rounded">?district=...</code>).</p>
        <a href="index.html" className="mt-6 inline-flex items-center gap-1.5 text-sm text-blue-600 hover:underline"><Icon name="ArrowLeft" size={14}/> Home</a>
      </div>
    </div>
  );

  if(!ready)return<div className="min-h-screen flex items-center justify-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-500"></div></div>;

  return(
    <div className="min-h-screen bg-slate-50 flex flex-col">
      <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center gap-4 shadow-sm">
        <a href="index.html" className="flex items-center gap-1.5 text-slate-400 hover:text-slate-700 text-sm font-medium"><Icon name="ArrowLeft" size={16}/> Home</a>
        <div className="w-px h-5 bg-slate-200"/>
        <div className="flex items-center gap-2"><div className="bg-amber-500 p-1.5 rounded-lg text-white"><Icon name="Award" size={16}/></div><span className="font-bold text-slate-800">Judging Panel</span></div>
        <span className="text-xs font-mono text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{districtId}</span>
      </header>
      <main className="flex-1 p-6 md:p-10 max-w-3xl mx-auto w-full space-y-6">
        <div>
          <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5 tracking-wide">Select Event</label>
          <select className="w-full p-3 border-2 border-slate-200 rounded-xl text-sm font-medium focus:border-amber-400 outline-none bg-white" value={selEv} onChange={e=>{setSelEv(e.target.value);setSearch('');}}>
            <option value="">Choose an event...</option>
            {events.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
        </div>
        {ev&&(
          <div className="bg-amber-50 border border-amber-200 rounded-xl px-5 py-4">
            <div className="flex flex-wrap gap-2 items-center">
              <div><div className="font-bold text-amber-900">{ev.name}</div>{ev.instructions&&<div className="text-xs text-amber-700 mt-0.5">{ev.instructions}</div>}</div>
              <div className="flex gap-2 ml-auto flex-wrap">
                <span className="text-[10px] font-bold uppercase px-2 py-0.5 rounded bg-amber-100 text-amber-600 border border-amber-200">{ev.type}</span>
                <span className="text-[10px] font-bold uppercase px-2 py-0.5 rounded bg-white text-amber-600 border border-amber-200">{ev.method}{ev.method==='absolute'?` / ${ev.absoluteType||'open'}`:''}</span>
              </div>
            </div>
          </div>
        )}
        {ev&&(
          <div>
            <div className="flex items-center gap-3 mb-3">
              <div className="relative flex-1">
                <Icon name="Search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                <input placeholder="Search teams..." className="w-full pl-9 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:border-amber-400 outline-none" value={search} onChange={e=>setSearch(e.target.value)}/>
              </div>
              <span className="text-xs text-slate-400 whitespace-nowrap">{filtRegs.length} team{filtRegs.length!==1?'s':''}</span>
            </div>
            <div className="space-y-3">
              {filtRegs.map(team=>{
                const existing=evScores.find(s=>s.teamId===team.id);
                const isTime=ev.type?.includes('time');
                const teamLabel=`${team.teamNumber?`Team ${team.teamNumber} – `:''}${team.teamName} – ${team.schoolName}`;
                return(
                  <div key={team.id} className="bg-white rounded-xl border border-slate-200 shadow-sm p-5 hover:border-amber-200 transition-all">
                    <div className="flex items-start justify-between mb-4">
                      <div>
                        <div className="flex items-center gap-2">
                          {team.teamNumber&&<span className="text-xs font-black bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full border border-amber-200">#{team.teamNumber}</span>}
                          <div className="font-bold text-slate-900">{team.teamName}</div>
                        </div>
                        <div className="text-xs text-slate-500 mt-0.5">{team.schoolName}</div>
                      </div>
                      {existing&&(
                        <div className="text-right">
                          <div className="text-xs text-slate-400 uppercase font-bold mb-0.5">Current</div>
                          <div className="font-mono font-black text-emerald-600 text-lg">{existing.rawValue}{isTime?'s':''}</div>
                        </div>
                      )}
                    </div>
                    {ev.method==='absolute'&&ev.absoluteType==='open'&&(
                      <div>
                        <div className="flex items-center justify-between text-xs text-slate-400 mb-1.5">
                          <span>Enter score (max {ev.maxScore||100})</span>
                          {inputVals[team.id]!==undefined&&<span className="font-mono text-slate-600">= {Math.min(parseFloat(inputVals[team.id])||0,ev.maxScore||100)}</span>}
                        </div>
                        <input type="range" className="w-full h-2 accent-amber-500 cursor-pointer" min="0" max={ev.maxScore||100} step="1"
                          value={inputVals[team.id]??0} onChange={e=>setInput(team.id,e.target.value)}/>
                        <div className="flex justify-between text-xs text-slate-300 mt-1"><span>0</span><span>{ev.maxScore||100}</span></div>
                      </div>
                    )}
                    {ev.method==='absolute'&&ev.absoluteType==='fixed'&&(
                      <div className="flex flex-wrap gap-2">
                        {(ev.fixedValues||[]).map((val,i)=>(
                          <button key={i} onClick={()=>setInput(team.id,String(val))}
                            className={`px-4 py-2 rounded-xl border-2 text-sm font-bold transition-all ${String(inputVals[team.id])===String(val)?'border-amber-500 bg-amber-50 text-amber-700':'border-slate-200 text-slate-600 hover:border-amber-300'}`}>
                            {val}
                          </button>
                        ))}
                      </div>
                    )}
                    {ev.method!=='absolute'&&(
                      <div className="flex items-center gap-3">
                        <input type="number" step={ev.type?.includes('time')?'0.01':'1'} placeholder={isTime?'Enter time (s)':'Enter score'}
                          className="flex-1 p-2.5 border-2 border-slate-200 rounded-xl text-sm font-mono focus:border-amber-400 outline-none"
                          value={inputVals[team.id]??''}
                          onChange={e=>setInput(team.id,e.target.value)}
                          onKeyDown={e=>e.key==='Enter'&&submitScore(team.id)}/>
                        {isTime&&<span className="text-xs text-slate-400 font-semibold">seconds</span>}
                      </div>
                    )}
                    <div className="flex items-center gap-3 mt-3">
                      <button onClick={()=>submitScore(team.id)}
                        disabled={inputVals[team.id]===undefined||inputVals[team.id]===''||submitting[team.id]}
                        className="flex-1 py-2.5 bg-amber-500 text-white font-bold rounded-xl hover:bg-amber-600 disabled:opacity-30 transition-all text-sm shadow-sm">
                        {submitting[team.id]?'Saving...':(existing?'Update Score':'Submit Score')}
                      </button>
                      {saved[team.id]&&<div className="flex items-center gap-1.5 text-emerald-600 text-sm font-semibold"><Icon name="CheckCircle" size={16}/> Saved!</div>}
                    </div>
                  </div>
                );
              })}
              {filtRegs.length===0&&<div className="text-center py-12 bg-white rounded-xl border border-slate-200"><p className="text-slate-400">No teams found.</p></div>}
            </div>
          </div>
        )}
        {!ev&&events.length===0&&(<div className="text-center py-20 bg-white rounded-xl border border-slate-200">
          <Icon name="Trophy" size={40} className="mx-auto text-slate-300 mb-4"/>
          <p className="text-slate-500 font-medium">No events configured yet.</p>
          <p className="text-xs text-slate-400 mt-1">Ask your admin to add events in the Admin Panel.</p>
          <p className="text-xs text-slate-300 mt-2 font-mono">district: {districtId}</p>
        </div>)}
        {!ev&&events.length>0&&(<div className="text-center py-20 bg-white rounded-xl border border-slate-200">
          <Icon name="Zap" size={40} className="mx-auto text-slate-300 mb-4"/>
          <p className="text-slate-500 font-medium">Select an event above to start scoring.</p>
        </div>)}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
