<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>RoboScore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-100">
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const firebaseConfig = {
  apiKey: "AIzaSyDCHyAsSgut1ugpDyv0U4gslu1Z_5WOdDk",
  authDomain: "ms-robotics-reg-and-scoring.firebaseapp.com",
  databaseURL: "https://ms-robotics-reg-and-scoring-default-rtdb.firebaseio.com",
  projectId: "ms-robotics-reg-and-scoring",
  appId: "1:1095575706479:web:79266306ca32f4f9bf269a"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const ICONS = {
  Trophy: '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>',
  Settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
  ClipboardList: '<rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/>',
  Award: '<circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/>',
  BarChart2: '<line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/>',
  ChevronRight: '<path d="m9 18 6-6-6-6"/>',
  LogOut: '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>',
  Mail: '<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
};

function Icon({ name, size=18, className='' }) {
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size}
      viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      className={className}
      dangerouslySetInnerHTML={{ __html: ICONS[name]||'' }} />
  );
}

function LoginView() {
  const [ep,setEp]=useState(false);
  const [em,setEm]=useState(''), [pw,setPw]=useState(''), [err,setErr]=useState(''), [busy,setBusy]=useState(false);
  const signInGoogle=async()=>{try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}catch(e){setErr(e.message);}};
  const signInMicrosoft=async()=>{try{await auth.signInWithPopup(new firebase.auth.OAuthProvider('microsoft.com'));}catch(e){setErr(e.message);}};
  const submit=async()=>{
    setBusy(true);setErr('');
    try{await auth.signInWithEmailAndPassword(em,pw);}catch(e){setErr(e.message||'Sign-in failed.');}
    setBusy(false);
  };
  return(
    <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
      <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div className="text-center mb-8">
          <div className="inline-flex items-center justify-center w-16 h-16 bg-amber-500 rounded-2xl shadow-lg shadow-amber-200 mb-4 text-white">
            <Icon name="Trophy" size={32}/>
          </div>
          <h1 className="text-2xl font-black text-slate-900">RoboScore</h1>
          <p className="text-slate-500 text-sm mt-1">Sign in to continue</p>
        </div>
        <div className="space-y-3">
          <button onClick={signInGoogle} className="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 py-3 rounded-xl font-semibold text-slate-700 hover:bg-slate-50 transition-all shadow-sm">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" alt="Google"/> Continue with Google
          </button>
          <button onClick={signInMicrosoft} className="w-full flex items-center justify-center gap-3 bg-[#2F2F2F] text-white py-3 rounded-xl font-semibold hover:bg-black transition-all shadow-sm">
            <svg width="20" height="20" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
            Continue with Microsoft
          </button>
          <div className="relative flex items-center gap-3 py-1"><div className="flex-1 h-px bg-slate-200"/><span className="text-xs text-slate-400 font-semibold">OR</span><div className="flex-1 h-px bg-slate-200"/></div>
          {!ep?(
            <button onClick={()=>setEp(true)} className="w-full py-3 rounded-xl border border-slate-200 text-slate-600 font-semibold text-sm hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
              <Icon name="Mail" size={16}/> Sign in with Email & Password
            </button>
          ):(
            <div className="space-y-3">
              <input type="email" autoFocus placeholder="Email" className="w-full p-3 border border-slate-200 rounded-xl text-sm focus:border-amber-400 outline-none" value={em} onChange={e=>setEm(e.target.value)}/>
              <input type="password" placeholder="Password" className="w-full p-3 border border-slate-200 rounded-xl text-sm focus:border-amber-400 outline-none" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/>
              <button onClick={submit} disabled={!em||!pw||busy} className="w-full py-3 bg-amber-500 text-white font-bold rounded-xl hover:bg-amber-600 disabled:opacity-40 transition-all">{busy?'Signing in...':'Sign In'}</button>
              <button onClick={()=>{setEp(false);setErr('');}} className="w-full text-sm text-slate-400 hover:text-slate-600">Back</button>
            </div>
          )}
          {err&&<p className="text-xs text-red-500 text-center">{err}</p>}
        </div>
      </div>
    </div>
  );
}

function Hub({ user }) {
  const cards = [
    { href:'admin.html', color:'bg-amber-500', shadow:'shadow-amber-200', border:'hover:border-amber-300', chevron:'group-hover:text-amber-400', icon:'Settings', title:'Admin Panel', desc:'Manage districts, events, schools, coaches, and scores.' },
    { href:'registration.html', color:'bg-blue-600', shadow:'shadow-blue-200', border:'hover:border-blue-300', chevron:'group-hover:text-blue-400', icon:'ClipboardList', title:'Team Registration', desc:'Coaches: sign in to register your teams.' },
  ];
  return(
    <div className="min-h-screen bg-slate-100 flex flex-col">
      <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shadow-sm">
        <div className="flex items-center gap-2">
          <div className="bg-amber-500 p-1.5 rounded-lg text-white"><Icon name="Trophy" size={16}/></div>
          <span className="font-black text-slate-900">RoboScore</span>
        </div>
        <div className="flex items-center gap-3">
          {user.photoURL&&<img src={user.photoURL} className="w-8 h-8 rounded-full" alt={user.displayName}/>}
          <span className="text-sm text-slate-600 hidden sm:block">{user.displayName||user.email}</span>
          <button onClick={()=>auth.signOut()} className="flex items-center gap-1.5 px-3 py-1.5 text-sm text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-all"><Icon name="LogOut" size={14}/> Sign out</button>
        </div>
      </header>
      <main className="flex-1 flex items-center justify-center p-6">
        <div className="max-w-xl w-full space-y-4">
          <div className="text-center mb-6">
            <h2 className="text-2xl font-black text-slate-900">Welcome back</h2>
            <p className="text-slate-500 text-sm mt-1">Where would you like to go?</p>
          </div>
          {cards.map(c=>(
            <a key={c.href} href={c.href} className={`group bg-white rounded-2xl p-6 border border-slate-200 ${c.border} hover:shadow-xl transition-all shadow-sm flex items-center gap-5`}>
              <div className={`${c.color} text-white p-3 rounded-xl shadow-md ${c.shadow} transition-shadow`}>
                <Icon name={c.icon} size={24}/>
              </div>
              <div className="flex-1"><div className="font-bold text-slate-900 text-lg">{c.title}</div><div className="text-slate-500 text-sm mt-0.5">{c.desc}</div></div>
              <Icon name="ChevronRight" size={18} className={`text-slate-300 ${c.chevron} transition-colors`}/>
            </a>
          ))}
          <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm space-y-3">
            <div className="flex items-center gap-4">
              <div className="bg-emerald-600 text-white p-3 rounded-xl shadow-md"><Icon name="Award" size={24}/></div>
              <div><div className="font-bold text-slate-900 text-lg">Judging Panel</div><div className="text-slate-500 text-sm mt-0.5">Judges use a district-specific link.</div></div>
            </div>
            <p className="text-xs text-slate-400 bg-slate-50 rounded-xl px-4 py-3 border border-slate-100">
              Link format: <code className="font-mono text-emerald-600">judging.html?district=your-district-id</code><br/>Get this from your district admin panel.
            </p>
          </div>
          <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm space-y-3">
            <div className="flex items-center gap-4">
              <div className="bg-slate-800 text-white p-3 rounded-xl shadow-md"><Icon name="BarChart2" size={24}/></div>
              <div><div className="font-bold text-slate-900 text-lg">Scoreboard</div><div className="text-slate-500 text-sm mt-0.5">Live standings via district-specific link.</div></div>
            </div>
            <p className="text-xs text-slate-400 bg-slate-50 rounded-xl px-4 py-3 border border-slate-100">
              Link format: <code className="font-mono text-slate-600">scoreboard.html?district=your-district-id</code><br/>Get this from your district admin panel.
            </p>
          </div>
        </div>
      </main>
    </div>
  );
}

function App() {
  const [user,setUser]=useState(undefined);
  useEffect(()=>{const u=auth.onAuthStateChanged(u=>setUser(u));return()=>u();},[]);
  if(user===undefined)return<div className="min-h-screen flex items-center justify-center bg-slate-100"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-500"></div></div>;
  if(!user||user.isAnonymous)return<LoginView/>;
  return<Hub user={user}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
